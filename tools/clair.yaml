name: "clair"
command: "clair"
enabled: false
short_description: "Container vulnerability analysis tool"
description: |
  Clair is a container vulnerability analysis tool for scanning container images for vulnerabilities.

  **Key Features:**
  - Container image scanning
  - Vulnerability detection
  - Multiple database support
  - API interface

  **Use Cases:**
  - Container security scanning
  - Vulnerability detection
  - CI/CD integration
  - Security audit
parameters:
  - name: "image"
    type: "string"
    description: "Container image to scan"
    required: true
    flag: "--image"
    format: "flag"
  - name: "config"
    type: "string"
    description: "Clair configuration file"
    required: false
    flag: "--config"
    format: "flag"
  - name: "format"
    type: "string"
    description: "Output format (json, yaml)"
    required: false
    flag: "--format"
    format: "flag"
  - name: "additional_args"
    type: "string"
    description: |
      Additional clair parameters for passing options not listed above.

      **Notes:**
      - Separate multiple parameters with spaces
    required: false
    format: "positional"
