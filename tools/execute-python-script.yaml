name: "execute-python-script"
command: "/bin/bash"
args:
  - "-c"
  - |
    set -euo pipefail

    SCRIPT_CONTENT="$1"
    ENV_NAME="${2:-default}"
    ADDITIONAL_ARGS="${3:-}"

    BASE_DIR="${HOME}/.cyberstrike/venvs"

    detect_project_root() {
      if [ -n "${CYBERSTRIKE_ROOT:-}" ] && [ -d "${CYBERSTRIKE_ROOT}" ]; then
        printf '%s\n' "${CYBERSTRIKE_ROOT}"
        return
      fi
      if command -v git >/dev/null 2>&1; then
        local root_path
        if root_path=$(git rev-parse --show-toplevel 2>/dev/null); then
          printf '%s\n' "$root_path"
          return
        fi
      fi
      printf '%s\n' "$(pwd)"
    }

    resolve_env_dir() {
      local requested="$1"
      if [ -n "${VIRTUAL_ENV:-}" ] && { [ -z "$requested" ] || [ "$requested" = "default" ]; }; then
        printf '%s\n' "$VIRTUAL_ENV"
        return
      fi
      if [ -z "$requested" ] || [ "$requested" = "default" ]; then
        local root
        root="$(detect_project_root)"
        printf '%s/venv\n' "$root"
        return
      fi
      printf '%s/%s\n' "$BASE_DIR" "$requested"
    }

    ENV_DIR="$(resolve_env_dir "$ENV_NAME")"
    mkdir -p "$(dirname "$ENV_DIR")"
    if [ ! -d "$ENV_DIR" ]; then
      python3 -m venv "$ENV_DIR"
    fi

    # shellcheck disable=SC1090
    source "$ENV_DIR/bin/activate"

    if [ -n "$ADDITIONAL_ARGS" ]; then
      python3 $ADDITIONAL_ARGS -c "$SCRIPT_CONTENT"
    else
      python3 -c "$SCRIPT_CONTENT"
    fi
  - "_"
enabled: true
short_description: "Write and execute Python scripts in a specified virtual environment"
description: |
  Execute Python scripts in a virtual environment.

  **Key Features：**
  - Execute Python scripts
  - Virtual environment support
  - Script content execution

  **Use Cases：**
  - Script execution
  - Automation tasks
  - Data processing
parameters:
  - name: "script"
    type: "string"
    description: |
      The Python script content to execute, supports multiple lines.

      **Examples：**
      ```
      for i in range(1, 10):
          print(i)
      ```
    required: true
    position: 0
    format: "positional"
  - name: "env_name"
    type: "string"
    description: "Virtual environment name (default: default)"
    required: false
    default: "default"
    position: 1
    format: "positional"
  - name: "additional_args"
    type: "string"
    description: |
      Additional execute-python-script parameters. Used to pass execute-python-script options not defined in the parameter list.

      **Example Values：**
      - Add common parameter examples based on the tool

      **Notes：**
      - Separate multiple parameters with spaces
      - Ensure correct parameter format to avoid command injection
      - This parameter is appended directly to the end of the command
    required: false
    format: "positional"
    default: ""
