name: "ffuf"
command: "ffuf"
enabled: true
short_description: "Fast web fuzzer tool"
description: |
  FFuf is a fast web fuzzer tool, used for directory discovery, parameter fuzzing, and content discovery.

  **Key Features:**
  - Fast directory and file discovery
  - Parameter fuzzing
  - Virtual host discovery
  - Custom filters and matchers
  - Multi-threaded support

  **Use Cases:**
  - Web application security testing
  - Directory enumeration
  - Parameter discovery
  - Content discovery
parameters:
  - name: "url"
    type: "string"
    description: "Target URL (Use FUZZ as a placeholder)"
    required: true
    flag: "-u"
    format: "flag"
  - name: "wordlist"
    type: "string"
    description: "Wordlist file path"
    required: false
    default: "/usr/share/wordlists/dirb/common.txt"
    flag: "-w"
    format: "flag"
  - name: "match_codes"
    type: "string"
    description: "HTTP status codes to match (comma-separated)"
    required: false
    default: "200,204,301,302,307,401,403"
    flag: "-mc"
    format: "flag"
  - name: "additional_args"
    type: "string"
    description: "Additional FFuf arguments"
    required: false
    format: "positional"
