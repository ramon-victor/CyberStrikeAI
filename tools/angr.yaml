name: "angr"
command: "python3"
args:
  - "-c"
  - |
    import shlex
    import sys

    if len(sys.argv) < 2:
        sys.stderr.write("Missing script content\n")
        sys.exit(1)

    script_content = sys.argv[1]
    binary = sys.argv[2] if len(sys.argv) > 2 else ""
    find_address = sys.argv[3] if len(sys.argv) > 3 else ""
    avoid_addresses = sys.argv[4] if len(sys.argv) > 4 else ""
    analysis_type = sys.argv[5] if len(sys.argv) > 5 else ""
    extra = sys.argv[6] if len(sys.argv) > 6 else ""

    context = {
        "binary_path": binary,
        "find_address": find_address,
        "avoid_addresses": [addr.strip() for addr in avoid_addresses.split(",") if addr.strip()],
        "analysis_type": analysis_type or "symbolic",
    }

    if extra:
        context["additional_args"] = shlex.split(extra)
    else:
        context["additional_args"] = []

    # Execute user script, providing context variables
    exec(script_content, context)
enabled: true
short_description: "Symbolic execution and binary analysis framework"
description: |
  Angr is a symbolic execution and binary analysis framework for automated vulnerability discovery and exploitation.

  **Usage:**
  - Provide a Python script via the `script_content` parameter. You can directly import `angr` and access the following variables:
  - `binary_path`: target binary path
  - `find_address`: address to find (can be empty)
  - `avoid_addresses`: list of addresses to avoid
  - `analysis_type`: custom analysis type tag (default: symbolic)
  - `additional_args`: additional arguments list (passed via the `additional_args` parameter)
  - Control the analysis flow within the script; you can call `print()` to output results.
parameters:
  - name: "script_content"
    type: "string"
    description: "angr Python script content to execute"
    required: true
    position: 0
    format: "positional"
  - name: "binary"
    type: "string"
    description: "Binary file path to analyze, passed to the script as the binary_path variable"
    required: false
    default: ""
    position: 1
    format: "positional"
  - name: "find_address"
    type: "string"
    description: "Address to find during symbolic execution (optional, passed as script variable find_address)"
    required: false
    default: ""
    position: 2
    format: "positional"
  - name: "avoid_addresses"
    type: "string"
    description: "Addresses to avoid (comma-separated, script variable avoid_addresses)"
    required: false
    default: ""
    position: 3
    format: "positional"
  - name: "analysis_type"
    type: "string"
    description: "Analysis type label for custom branching within the script (e.g. symbolic/cfg/static)"
    required: false
    default: "symbolic"
    position: 4
    format: "positional"
  - name: "additional_args"
    type: "string"
    description: |
      Additional parameters accessible via the `additional_args` list in the script.

      **Examples:**
      - "--max-depth 8 --timeout 60"

      **Notes:**
      - Arguments are split using shell rules
    required: false
    default: ""
    position: 5
    format: "positional"
