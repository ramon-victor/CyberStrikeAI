name: "dnsenum"
command: "dnsenum"
enabled: true
short_description: "DNS enumeration tool"
description: |
  DNSenumis a DNS information gathering tool, used for enumerating DNS information.

  **Key Features:**
  - DNS information gathering
  - Subdomain enumeration
  - Zone transfer testing
  - Reverse lookup

  **Use Cases:**
  - DNS enumeration
  - Subdomain discovery
  - Network reconnaissance
  - Penetration testing
parameters:
  - name: "domain"
    type: "string"
    description: "Target domain"
    required: true
    position: 0
    format: "positional"
  - name: "dns_server"
    type: "string"
    description: "DNS server to use"
    required: false
    flag: "-n"
    format: "flag"
  - name: "wordlist"
    type: "string"
    description: "Wordlist file for brute force"
    required: false
    flag: "-f"
    format: "flag"
  - name: "additional_args"
    type: "string"
    description: |
      Additional dnsenum parameters. Used to pass dnsenum options not defined in the parameter list.

      **Example Values:**
      - Add common parameter examples based on the tool

      **Notes:**
      - Separate multiple parameters with spaces
      - Ensure correct parameter format to avoid command injection
      - This parameter is appended directly to the end of the command
    required: false
    format: "positional"
