name: "ropgadget"
command: "ROPgadget"
enabled: true
short_description: "ROP gadget search tool for binary exploitation"
description: |
  ROPgadget is a tool for searching ROP gadgets in binary files.

  **Key Features:**
  - ROP gadget search
  - Multi-architecture support
  - Gadget categorization
  - ROP chain generation

  **Use Cases:**
  - Binary analysis
  - Exploit development
  - ROP chain construction
  - Security research
parameters:
  - name: "binary"
    type: "string"
    description: "Path to the binary file to analyze"
    required: true
    position: 0
    format: "positional"
  - name: "additional_args"
    type: "string"
    description: |
      Additional ROPgadget arguments. Used to pass ROPgadget options not defined in the parameter list.

      **Example Values:**
      - Add common parameter examples based on the tool

      **Notes:**
      - Separate multiple parameters with spaces
      - Ensure correct parameter format to avoid command injection
      - This parameter is appended directly to the end of the command
    required: false
    format: "positional"
