name: "ghidra"
command: "analyzeHeadless"
enabled: true
short_description: "Advanced binary analysis and reverse engineering tool"
description: |
  Ghidra is a free binary analysis and reverse engineering tool developed by the NSA.

  **Key Features:**
  - Disassembly and decompilation
  - Advanced analysis
  - Script support
  - Collaboration features

  **Use Cases:**
  - Binary analysis
  - Reverse engineering
  - Malware analysis
  - Vulnerability research
parameters:
  - name: "project_dir"
    type: "string"
    description: "Directory to store Ghidra projects"
    required: false
    default: "/tmp/ghidra_projects"
    position: 0
    format: "positional"
  - name: "project_name"
    type: "string"
    description: "Ghidra project name"
    required: false
    default: "cyberstrike_analysis"
    position: 1
    format: "positional"
  - name: "binary"
    type: "string"
    description: "Path to the binary file to analyze"
    required: true
    flag: "-import"
    format: "flag"
  - name: "script_file"
    type: "string"
    description: "Optional Ghidra script file (executed via -postScript) "
    required: false
    flag: "-postScript"
    format: "flag"
  - name: "additional_args"
    type: "string"
    description: |
      Additional ghidra parameters. Used to pass ghidra options not defined in the parameter list.

      **Example Values:**
      - Add common parameter examples based on the tool

      **Notes:**
      - Separate multiple parameters with spaces
      - Ensure correct parameter format to avoid command injection
      - This parameter is appended directly to the end of the command
    required: false
    format: "positional"
