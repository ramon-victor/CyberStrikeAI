name: "msfvenom"
command: "msfvenom"
enabled: true
short_description: "Metasploit payload generator"
description: |
  MSFVenom is the payload generation tool of the Metasploit framework, used for creating various types of attack payloads.

  **Key Features:**
  - Multiple payload types
  - Encoder support
  - Multiple output formats
  - Platform support

  **Use Cases:**
  - Penetration testing
  - Payload generation
  - Exploit development
  - Security testing
parameters:
  - name: "payload"
    type: "string"
    description: "Payload to generate (e.g., windows/meterpreter/reverse_tcp)"
    required: true
    flag: "-p"
    format: "flag"
  - name: "format_type"
    type: "string"
    description: "Output format (exe, elf, raw, etc.)"
    required: false
    flag: "-f"
    format: "flag"
  - name: "output_file"
    type: "string"
    description: "Output file path"
    required: false
    flag: "-o"
    format: "flag"
  - name: "encoder"
    type: "string"
    description: "Encoder (e.g., x86/shikata_ga_nai)"
    required: false
    flag: "-e"
    format: "flag"
  - name: "iterations"
    type: "string"
    description: "Number of encoding iterations"
    required: false
    flag: "-i"
    format: "flag"
  - name: "additional_args"
    type: "string"
    description: |
      Additional msfvenom parameters. Used to pass msfvenom options not defined in the parameter list.

      **Example Values:**
      - Add common parameter examples based on the tool

      **Notes:**
      - Separate multiple parameters with spaces
      - Ensure correct parameter format to avoid command injection
      - This parameter is appended directly to the end of the command
    required: false
    format: "positional"
