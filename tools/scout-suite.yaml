name: "scout-suite"
command: "scout"
enabled: true
short_description: "Multi-cloud security auditing tool"
description: |
  Scout Suite is a multi-cloud security assessment tool, supporting AWS, Azure, GCP, Aliyun, and OCI.

  **Key Features:**
  - Multi-cloud security assessment
  - Configuration auditing
  - Security best practice checks
  - Detailed report generation

  **Use Cases:**
  - Cloud security audit
  - Compliance checks
  - Security assessment
  - Cloud configuration audit
parameters:
  - name: "provider"
    type: "string"
    description: "Cloud provider (aws, azure, gcp, aliyun, oci) "
    required: false
    flag: "--provider"
    format: "flag"
    default: "aws"
  - name: "profile"
    type: "string"
    description: "AWS profile name"
    required: false
    flag: "--profile"
    format: "flag"
    default: "default"
  - name: "report_dir"
    type: "string"
    description: "Directory to save reports"
    required: false
    flag: "--report-dir"
    format: "flag"
    default: "/tmp/scout-suite"
  - name: "services"
    type: "string"
    description: "Specific services to assess"
    required: false
    flag: "--services"
    format: "flag"
  - name: "additional_args"
    type: "string"
    description: |
      Additional scout-suite parameters. Used to pass scout-suite options not defined in the parameter list.

      **Example Values:**
      - Add common parameter examples based on the tool

      **Notes:**
      - Separate multiple parameters with spaces
      - Ensure correct parameter format to avoid command injection
      - This parameter is appended directly to the end of the command
    required: false
    format: "positional"
