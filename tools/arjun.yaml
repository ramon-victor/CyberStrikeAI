name: "arjun"
command: "arjun"
enabled: true
short_description: "HTTP parameter discovery tool"
description: |
  Arjun is an HTTP parameter discovery tool used to find hidden parameters in web applications.

  **Key Features:**
  - HTTP parameter discovery
  - Multiple HTTP method support
  - Multi-threaded
  - Stable mode

  **Use Cases:**
  - Parameter discovery
  - Web application security testing
  - Bug bounty reconnaissance
  - Security testing
parameters:
  - name: "url"
    type: "string"
    description: "Target URL"
    required: true
    flag: "-u"
    format: "flag"
  - name: "method"
    type: "string"
    description: "HTTP method (GET, POST, etc.)"
    required: false
    flag: "-m"
    format: "flag"
    default: "GET"
  - name: "wordlist"
    type: "string"
    description: "Custom wordlist file"
    required: false
    flag: "-w"
    format: "flag"
  - name: "threads"
    type: "int"
    description: "Number of threads"
    required: false
    flag: "-t"
    format: "flag"
    default: 25
  - name: "stable"
    type: "bool"
    description: "Use stable mode"
    required: false
    flag: "--stable"
    format: "flag"
    default: false
  - name: "additional_args"
    type: "string"
    description: |
      Additional Arjun parameters for passing options not listed above.

      **Example values:**
      - "-o output.txt": output to file
      - "-q": quiet mode
      - "-i": read URLs from file

      **Notes:**
      - Separate multiple parameters with spaces
      - Ensure correct parameter format to avoid command injection
      - This parameter is appended directly to the end of the command
    required: false
    format: "positional"
