name: "feroxbuster"
command: "feroxbuster"
enabled: false
short_description: "Fast directory and file brute-forcing tool"
description: |
  Feroxbuster is a fast, simple recursive content discovery tool.

  **Key Features:**
  - Recursive directory discovery
  - Multi-threaded support
  - Auto filtering
  - Multiple output formats

  **Use Cases:**
  - Web content discovery
  - Directory enumeration
  - File discovery
  - Security testing
parameters:
  - name: "url"
    type: "string"
    description: "Target URL"
    required: true
    flag: "-u"
    format: "flag"
  - name: "wordlist"
    type: "string"
    description: "Wordlist file path"
    required: false
    flag: "-w"
    format: "flag"
  - name: "threads"
    type: "int"
    description: "Number of threads"
    required: false
    flag: "-t"
    format: "flag"
    default: 10
  - name: "additional_args"
    type: "string"
    description: |
      Additional feroxbuster arguments. Used to pass feroxbuster options not defined in the parameter list.

      **Example Values:**
      - Add common parameter examples based on the tool

      **Notes:**
      - Separate multiple parameters with spaces
      - Ensure correct parameter format to avoid command injection
      - This parameter is appended directly to the end of the command
    required: false
    format: "positional"
