name: "hydra"
command: "hydra"
enabled: true
short_description: "Online password brute-forcing tool"
description: |
  Hydra is a fast network login cracking tool, supporting brute-forcing of passwords across multiple protocols and services.

  **Key Features:**
  - Supports multiple protocols (SSH, FTP, HTTP, SMB, etc.)
  - Fast parallel cracking
  - Supports username and password dictionaries
  - Resumable sessions

  **Use Cases:**
  - Password strength testing
  - Penetration testing
  - Security assessment
  - Weak password detection
parameters:
  - name: "target"
    type: "string"
    description: "Target IP or hostname"
    required: true
    position: 0
    format: "positional"
  - name: "service"
    type: "string"
    description: "Service type (ssh, ftp, http, etc.) "
    required: true
    position: 1
    format: "positional"
  - name: "username"
    type: "string"
    description: "Single username"
    required: false
    flag: "-l"
    format: "flag"
  - name: "username_file"
    type: "string"
    description: "Username dictionary file"
    required: false
    flag: "-L"
    format: "flag"
  - name: "password"
    type: "string"
    description: "Single password"
    required: false
    flag: "-p"
    format: "flag"
  - name: "password_file"
    type: "string"
    description: "Password dictionary file"
    required: false
    flag: "-P"
    format: "flag"
  - name: "additional_args"
    type: "string"
    description: "Additional Hydra parameters"
    required: false
    format: "positional"
