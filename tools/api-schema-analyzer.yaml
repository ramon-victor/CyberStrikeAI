name: "api-schema-analyzer"
command: "spectral"
args: ["lint"]
enabled: true
short_description: "API schema analysis tool for identifying potential security issues"
description: |
  Run `spectral lint` to perform static analysis on OpenAPI/Swagger/GraphQL schemas, optionally combined with custom rulesets or output formats.
parameters:
  - name: "schema_url"
    type: "string"
    description: "API schema file or URL (passed as the target to `spectral lint`)"
    required: true
    position: 0
    format: "positional"
  - name: "additional_args"
    type: "string"
    description: |
      Additional Spectral parameters, such as `--ruleset`, `--format`, `--fail-severity`, etc.
    required: false
    format: "positional"
