name: "fierce"
command: "fierce"
enabled: true
short_description: "DNS reconnaissance and subdomain enumeration tool"
description: |
  Fierce is a DNS reconnaissance tool, used for discovering subdomains of a target domain.

  **Key Features:**
  - Subdomain discovery
  - DNS brute forcing
  - Zone transfer testing
  - Network mapping

  **Use Cases:**
  - DNS reconnaissance
  - Subdomain enumeration
  - Network mapping
  - Penetration testing
parameters:
  - name: "domain"
    type: "string"
    description: "Target domain"
    required: true
    flag: "-dns"
    format: "flag"
  - name: "dns_server"
    type: "string"
    description: "DNS server to use"
    required: false
    flag: "-dnsserver"
    format: "flag"
  - name: "additional_args"
    type: "string"
    description: |
      Additional fierce arguments. Used to pass fierce options not defined in the parameter list.

      **Example Values:**
      - Add common parameter examples based on the tool

      **Notes:**
      - Separate multiple parameters with spaces
      - Ensure correct parameter format to avoid command injection
      - This parameter is appended directly to the end of the command
    required: false
    format: "positional"
