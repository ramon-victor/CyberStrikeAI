name: "kube-bench"
command: "kube-bench"
enabled: true
short_description: "Kubernetes security benchmark checking tool"
description: |
  Kube-bench is a CIS Kubernetes benchmark checking tool, used for checking whether Kubernetes clusters comply with CIS benchmarks.

  **Key Features:**
  - CIS benchmark checks
  - Multiple target support (master, node, etcd, policies)
  - Detailed reports
  - Configuration validation

  **Use Cases:**
  - Kubernetes compliance checks
  - Security configuration audit
  - CIS benchmark verification
  - Security assessment
parameters:
  - name: "targets"
    type: "string"
    description: "Target to check (master, node, etcd, policies) "
    required: false
    flag: "--targets"
    format: "flag"
  - name: "version"
    type: "string"
    description: "Kubernetes version"
    required: false
    flag: "--version"
    format: "flag"
  - name: "config_dir"
    type: "string"
    description: "Configuration directory"
    required: false
    flag: "--config-dir"
    format: "flag"
  - name: "output_format"
    type: "string"
    description: "Output format (json, yaml)"
    required: false
    flag: "--output"
    format: "flag"
    default: "json"
  - name: "additional_args"
    type: "string"
    description: |
      Additional kube-bench parameters. Used to pass kube-bench options not defined in the parameter list.

      **Example Values:**
      - Add common parameter examples based on the tool

      **Notes:**
      - Separate multiple parameters with spaces
      - Ensure correct parameter format to avoid command injection
      - This parameter is appended directly to the end of the command
    required: false
    format: "positional"
