name: "graphql-scanner"
command: "graphqlmap"
enabled: true
short_description: "GraphQL security scanning tool"
description: |
  Advanced GraphQL security scanning and introspection tool, used for detecting security issues in GraphQL APIs.

  **Key Features:**
  - GraphQL introspection
  - Query depth testing
  - Mutation operation testing
  - Vulnerability assessment

  **Use Cases:**
  - GraphQL security testing
  - API security assessment
  - Vulnerability discovery
  - Security testing
parameters:
  - name: "endpoint"
    type: "string"
    description: "GraphQL endpoint URL"
    required: true
    flag: "-u"
    format: "flag"
  - name: "introspection"
    type: "bool"
    description: "Test introspection queries"
    required: false
    default: true
    flag: "--introspection"
    format: "flag"
  - name: "query_depth"
    type: "int"
    description: "Maximum query depth to test"
    required: false
    default: 10
    flag: "--depth"
    format: "flag"
  - name: "test_mutations"
    type: "bool"
    description: "Test mutation operations"
    required: false
    default: true
    flag: "--mutations"
    format: "flag"
  - name: "additional_args"
    type: "string"
    description: |
      Additional graphql-scanner parameters. Used to pass graphql-scanner options not defined in the parameter list.

      **Example Values:**
      - Add common parameter examples based on the tool

      **Notes:**
      - Separate multiple parameters with spaces
      - Ensure correct parameter format to avoid command injection
      - This parameter is appended directly to the end of the command
    required: false
    format: "positional"
