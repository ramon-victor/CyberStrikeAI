name: "arp-scan"
command: "arp-scan"
enabled: true
short_description: "ARP network discovery tool"
description: |
  Arp-scan is an ARP network discovery tool used to find active hosts on the local network.

  **Key Features:**
  - ARP scanning
  - Local network discovery
  - MAC address identification
  - Fast scanning

  **Use Cases:**
  - Local network discovery
  - Host discovery
  - Network mapping
  - Penetration testing
parameters:
  - name: "target"
    type: "string"
    description: "Target IP range (if not using local_network)"
    required: false
    position: 0
    format: "positional"
  - name: "interface"
    type: "string"
    description: "Network interface"
    required: false
    flag: "-I"
    format: "flag"
  - name: "local_network"
    type: "bool"
    description: "Scan local network"
    required: false
    flag: "-l"
    format: "flag"
  - name: "additional_args"
    type: "string"
    description: |
      Additional arp-scan parameters for passing options not listed above.

      **Notes:**
      - Separate multiple parameters with spaces
    required: false
    format: "positional"
