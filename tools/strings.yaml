name: "strings"
command: "strings"
enabled: true
short_description: "String extraction tool from binary files"
description: |
  The Strings tool is used for extracting printable strings from binary files.

  **Key Features:**
  - String extraction
  - Configurable minimum length
  - Support for multiple file formats

  **Use Cases:**
  - Binary analysis
  - Malware analysis
  - Forensic analysis
  - Reverse engineering
parameters:
  - name: "file_path"
    type: "string"
    description: "File path to analyze"
    required: true
    position: 0
    format: "positional"
  - name: "min_len"
    type: "int"
    description: "Minimum string length"
    required: false
    flag: "-n"
    format: "flag"
    default: 4
  - name: "additional_args"
    type: "string"
    description: |
      Additional strings parameters. Used to pass strings options not defined in the parameter list.

      **Example Values:**
      - Add common parameter examples based on the tool

      **Notes:**
      - Separate multiple parameters with spaces
      - Ensure correct parameter format to avoid command injection
      - This parameter is appended directly to the end of the command
    required: false
    format: "positional"
