name: "radare2"
command: "r2"
enabled: true
short_description: "Binary analysis and reverse engineering framework, supporting disassembly, debugging, and script analysis"
description: |
  Radare2 is a complete binary analysis and reverse engineering framework, supporting multiple architectures and file formats.

  **Key Features:**
  - Disassembly and decompilation: supports multiple architectures (x86, ARM, MIPS, etc.)
  - Debugging support: local and remote debugging
  - Script support: supports r2pipe scripts and r2 command scripts
  - Multiple file formats: ELF, PE, Mach-O, firmware, etc.
  - Interactive analysis: command-line interface and visual mode
  - Automated analysis: batch analysis and scripted analysis

  **Use Cases:**
  - Binary file analysis
  - Reverse engineering and vulnerability research
  - Malware analysis
  - CTF competition reverse engineering challenges
  - Firmware analysis
  - Exploit development

  **Notes:**
  - You can use the -c parameter to execute commands and exit (non-interactive mode)
  - You can use the -i parameter to execute script files
  - You can use the -q parameter for quiet mode (no startup banner)
  - You can use the -A parameter to automatically analyze the binary
  - You can use the -d parameter to attach to a process for debugging
parameters:
  - name: "target"
    type: "string"
    description: |
      Target file, process ID, or special value.

      **Format:**
      - File path: "/path/to/binary"
      - Process ID: "1234" (requires the -d parameter)
      - Special values: "-" (read from stdin), "--" (interactive mode), "=" (read from environment variable)

      **Example Values:**
      - Binary file: "/tmp/vulnerable"
      - Process debugging: "1234" (with -d)
      - From stdin: "-"

      **Notes:**
      - Required parameter, cannot be empty
      - If specifying a process ID, the -d parameter must be used
      - Note: radare2 requires the file path to be the last argument, so target uses position 1
    required: true
    position: 1
    format: "positional"
  - name: "commands"
    type: "string"
    description: |
      Radare2 commands to execute. Can be a single command or multiple commands (separated by semicolons).

      **Format:**
      - Single command: "aaa" (auto-analyze)
      - Multiple commands: "aaa; pdf @main; VV" (analyze, disassemble main function, visual mode)

      **Common Commands:**
      - "aaa": Auto-analyze all functions
      - "afl": List all functions
      - "pdf @main": Disassemble main function
      - "px 64": Display 64 bytes in hexadecimal
      - "VV": Enter visual mode
      - "i": Display file information
      - "iz": Display strings

      **Example Values:**
      - "aaa" (auto-analyze)
      - "aaa; pdf @main" (analyze and disassemble main function)
      - "i; iz" (display info and strings)

      **Notes:**
      - Multiple commands are separated by semicolons (;)
      - The program exits after executing commands (non-interactive mode)
    required: false
    flag: "-c"
    format: "flag"
  - name: "script_file"
    type: "string"
    description: |
      Script file path to execute. The script file contains Radare2 commands, one per line.

      **Format:**
      - Script file path: "/path/to/script.r2"

      **Example Values:**
      - "/tmp/analyze.r2"
      - "./scripts/auto_analyze.r2"

      **Notes:**
      - Commands in the script file are executed in order
      - The program exits after script execution completes
    required: false
    flag: "-i"
    format: "flag"
  - name: "arch"
    type: "string"
    description: |
      Specify the target architecture.

      **Common Architectures:**
      - "x86": 32-bit x86
      - "x86_64": 64-bit x86
      - "arm": ARM architecture
      - "arm64": ARM64 architecture
      - "mips": MIPS architecture
      - "ppc": PowerPC architecture

      **Example Values:**
      - "x86"
      - "x86_64"
      - "arm"
      - "arm64"

      **Notes:**
      - If not specified, radare2 will attempt auto-detection
      - Some architectures may require additional configuration
    required: false
    flag: "-a"
    format: "flag"
  - name: "bits"
    type: "int"
    description: |
      Specify the target bit width (16, 32, 64).

      **Example Values:**
      - 16 (16-bit)
      - 32 (32-bit)
      - 64 (64-bit)

      **Notes:**
      - Typically used in conjunction with the -a parameter
      - If not specified, radare2 will attempt auto-detection
    required: false
    flag: "-b"
    format: "flag"
  - name: "auto_analyze"
    type: "bool"
    description: |
      Automatically analyze the binary file. Equivalent to executing the "aaa" command.

      **Use Cases:**
      - Quick analysis of binary files
      - Batch analysis

      **Notes:**
      - When enabled, all functions will be automatically analyzed
      - May take a long time
    required: false
    flag: "-A"
    format: "flag"
    default: false
  - name: "debug"
    type: "bool"
    description: |
      Debug mode. Can attach to a process or debug a file.

      **Use Cases:**
      - Attach to a running process
      - Debug binary files

      **Notes:**
      - Requires appropriate permissions
      - If the target is a process ID, this option must be enabled
    required: false
    flag: "-d"
    format: "flag"
    default: false
  - name: "quiet"
    type: "bool"
    description: |
      Quiet mode. Does not display startup banner and prompt.

      **Use Cases:**
      - Scripted usage
      - Batch analysis
      - Automated tool execution

      **Notes:**
      - Suitable for non-interactive use
      - Reduces output noise
    required: false
    flag: "-q"
    format: "flag"
    default: false
  - name: "seek"
    type: "string"
    description: |
      Set the start address. Can be a hexadecimal address or expression.

      **Format:**
      - Hexadecimal: "0x400000"
      - Expression: "main+0x10"

      **Example Values:**
      - "0x400000"
      - "main"
      - "0x1000"

      **Notes:**
      - Address can be hexadecimal or a symbol name
      - Used to start analysis from a specific position
    required: false
    flag: "-s"
    format: "flag"
  - name: "base_address"
    type: "string"
    description: |
      Set the base address. Used for the load address.

      **Format:**
      - Hexadecimal address: "0x400000"

      **Example Values:**
      - "0x400000"
      - "0x1000000"

      **Notes:**
      - Used to specify the load address of the binary file
      - Typically used for analyzing firmware or memory dumps
    required: false
    flag: "-B"
    format: "flag"
  - name: "eval"
    type: "string"
    description: |
      Set configuration variables. Format is key=value.

      **Format:**
      - "key=value"
      - Multiple variables separated by spaces: "asm.arch=x86 asm.bits=32"

      **Example Values:**
      - "asm.arch=x86"
      - "asm.bits=32"
      - "scr.color=false"

      **Notes:**
      - Used to set radare2 configuration variables
      - Multiple variables are separated by spaces
    required: false
    flag: "-e"
    format: "flag"
  - name: "project"
    type: "string"
    description: |
      Load or save a project file.

      **Format:**
      - Project file path: "/path/to/project.r2"

      **Example Values:**
      - "./project.r2"
      - "/tmp/analysis.r2"

      **Notes:**
      - Project files save analysis state and configuration
      - Can be used to restore previous analysis
    required: false
    flag: "-p"
    format: "flag"
  - name: "additional_args"
    type: "string"
    description: |
      Additional radare2 arguments. Used to pass radare2 options not defined in the parameter list.

      **Available Options:**
      - "-C": Force color output
      - "-f": Force open file (even if format does not match)
      - "-L": List supported plugins
      - "-M": Enable write mode
      - "-n": Do not load configuration files
      - "-N": Do not execute scripts
      - "-S": Start in debug mode
      - "-t": Use thread mode
      - "-u": Use unicorn engine
      - "-v": Display version information
      - "-w": Write mode
      - "-z": Scan for strings
      - "-X": Execute r2pipe script
      - "-P patch": Apply patch
      - "-m maddr": Map address

      **Example Values:**
      - "-w" (write mode)
      - "-n" (do not load configuration files)
      - "-M" (enable write mode)
      - "-z" (scan for strings)

      **Notes:**
      - Separate multiple parameters with spaces
      - Ensure correct parameter format to avoid command injection
      - This parameter is appended directly to the end of the command
    required: false
    format: "positional"
