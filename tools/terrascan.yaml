name: "terrascan"
command: "terrascan"
enabled: true
short_description: "Infrastructure-as-code security scanning tool"
description: |
  Terrascan is an infrastructure-as-code security scanning tool, used for detecting security issues in IaC configurations.

  **Key Features：**
  - IaC security scanning
  - Multi-framework support
  - Policy checks
  - Compliance verification

  **Use Cases：**
  - IaC security scanning
  - Cloud configuration audit
  - Security policy checks
  - Compliance checks
parameters:
  - name: "scan_type"
    type: "string"
    description: "Scan type (all, terraform, k8s etc.) "
    required: false
    flag: "--scan-type"
    format: "flag"
    default: "all"
  - name: "iac_dir"
    type: "string"
    description: "IaC directory"
    required: false
    flag: "-d"
    format: "flag"
    default: "."
  - name: "policy_type"
    type: "string"
    description: "Policy type to use"
    required: false
    flag: "--policy-type"
    format: "flag"
  - name: "output_format"
    type: "string"
    description: "Output format (json, yaml, xml)"
    required: false
    flag: "--output"
    format: "flag"
    default: "json"
  - name: "severity"
    type: "string"
    description: "Severity filter (high, medium, low) "
    required: false
    flag: "--severity"
    format: "flag"
  - name: "additional_args"
    type: "string"
    description: |
      Additional terrascan arguments. Used to pass terrascan options not defined in the parameter list.

      **Example Values：**
      - Add common parameter examples based on the tool

      **Notes：**
      - Separate multiple parameters with spaces
      - Ensure correct parameter format to avoid command injection
      - This parameter is appended directly to the end of the command
    required: false
    format: "positional"
