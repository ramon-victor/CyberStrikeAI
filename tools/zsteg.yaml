name: "zsteg"
command: "zsteg"
enabled: true
short_description: "Steganography detection tool for PNG/BMP images"
description: |
  zsteg is a tool for detecting LSB (Least Significant Bit) steganography in PNG and BMP images.

  **Key Features:**
  - LSB steganography detection
  - Multiple steganography algorithm support
  - Automatic hidden data extraction
  - Supports multiple image formats

  **Use Cases:**
  - CTF steganography challenges
  - Image steganography analysis
  - Digital forensics
  - Security research

  **Notes:**
  - Requires Ruby environment
  - Supports PNG and BMP formats
  - Can detect multiple steganography algorithms
parameters:
  - name: "file"
    type: "string"
    description: "Path to the image file to analyze"
    required: true
    position: 0
    format: "positional"
  - name: "all"
    type: "bool"
    description: "Detect all possible steganography methods"
    required: false
    flag: "--all"
    format: "flag"
  - name: "lsb"
    type: "bool"
    description: "Only detect LSB steganography"
    required: false
    flag: "--lsb"
    format: "flag"
  - name: "additional_args"
    type: "string"
    description: |
      Additional zsteg parameters. Used to pass zsteg options not defined in the parameter list.

      **Example Values:**
      - Add common parameter examples based on the tool

      **Notes:**
      - Separate multiple parameters with spaces
      - Ensure correct parameter format to avoid command injection
      - This parameter is appended directly to the end of the command
    required: false
    format: "positional"
