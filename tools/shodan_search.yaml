name: "shodan_search"
command: "python3"
args:
  - "-c"
  - |
    import sys
    import json
    import requests
    import os
    import math

    # ==================== Shodan Configuration ====================
    # Please configure your Shodan API Key here
    # You can also set it via the environment variable: SHODAN_API_KEY
    # enabled defaults to false, must be enabled to run this MCP
    SHODAN_API_KEY = "" # Please replace with your own Shodan API Key
    # ==================================================

    # Shodan API base URL
    base_url = "https://api.shodan.io"

    # Parse arguments (from JSON string or command-line arguments)
    def parse_args():
        # Try to read JSON config from the first argument
        if len(sys.argv) > 1:
            try:
                arg1 = str(sys.argv[1])
                config = json.loads(arg1)
                if isinstance(config, dict):
                    return config
            except (json.JSONDecodeError, TypeError, ValueError):
                pass

        # Traditional positional argument mode (backward compatible)
        # Supports two sequences:
        # 1) query,page,facets,minify,fields,count_only,size
        # 2) query,page,minify,fields,count_only,size (when facets is omitted, the executor compresses arguments)
        config = {}
        if len(sys.argv) > 1:
            config["query"] = str(sys.argv[1])
        if len(sys.argv) > 2:
            try:
                config["page"] = int(sys.argv[2])
            except (ValueError, TypeError):
                pass

        def is_bool_like(val):
            if isinstance(val, bool):
                return True
            if not isinstance(val, str):
                return False
            return val.strip().lower() in ("true", "false", "1", "0", "yes", "no")

        remaining = [str(x) for x in sys.argv[3:]]
        if remaining:
            # When facets is omitted, the first remaining argument is usually minify (boolean)
            first_is_bool = is_bool_like(remaining[0])
            idx = 0
            if not first_is_bool:
                config["facets"] = remaining[idx]
                idx += 1

            if idx < len(remaining):
                val = remaining[idx]
                config["minify"] = val.lower() in ("true", "1", "yes")
                idx += 1

            if idx < len(remaining):
                config["fields"] = remaining[idx]
                idx += 1

            if idx < len(remaining):
                val = remaining[idx]
                config["count_only"] = val.lower() in ("true", "1", "yes")
                idx += 1

            if idx < len(remaining):
                try:
                    config["size"] = int(remaining[idx])
                except (ValueError, TypeError):
                    pass

        return config

    def normalize_bool(value, default_value):
        if value is None:
            return default_value
        if isinstance(value, bool):
            return value
        if isinstance(value, str):
            return value.lower() in ("true", "1", "yes")
        if isinstance(value, (int, float)):
            return value != 0
        return default_value

    try:
        config = parse_args()

        if not isinstance(config, dict):
            error_result = {
                "status": "error",
                "message": f"Argument parsing error: expected dict type, but got {type(config).__name__}",
                "type": "TypeError"
            }
            print(json.dumps(error_result, ensure_ascii=False, indent=2))
            sys.exit(1)

        api_key = os.getenv("SHODAN_API_KEY", SHODAN_API_KEY).strip()
        query = str(config.get("query", "")).strip()

        if not api_key:
            error_result = {
                "status": "error",
                "message": "Missing Shodan configuration: api_key (Shodan API key) ",
                "required_config": ["api_key"],
                "note": "Please fill in your API key in the SHODAN_API_KEY configuration item in the YAML file, or set it in the environment variable SHODAN_API_KEY. You can find your API key on the Shodan account page: https://account.shodan.io/"
            }
            print(json.dumps(error_result, ensure_ascii=False, indent=2))
            sys.exit(1)

        if not query:
            error_result = {
                "status": "error",
                "message": "Missing required parameter: query (search query string) ",
                "required_params": ["query"],
                "examples": [
                    "product:nginx",
                    "apache country:DE",
                    "port:22",
                    "ssl.cert.subject.cn:example.com",
                    "org:\"Amazon\" port:443"
                ]
            }
            print(json.dumps(error_result, ensure_ascii=False, indent=2))
            sys.exit(1)

        count_only = normalize_bool(config.get("count_only"), False)
        minify = normalize_bool(config.get("minify"), True)
        requested_size = config.get("size", None)
        if requested_size is not None:
            try:
                requested_size = int(requested_size)
                if requested_size <= 0:
                    requested_size = None
                else:
                    # Prevent excessively large single requests causing quota and response time issues
                    requested_size = min(requested_size, 1000)
            except (ValueError, TypeError):
                requested_size = None

        # Select search endpoint based on count_only
        endpoint = "/shodan/host/count" if count_only else "/shodan/host/search"
        url = f"{base_url}{endpoint}"

        params = {
            "key": api_key,
            "query": query
        }

        # Optional parameter: facets (supported by both search and count)
        if "facets" in config and config["facets"]:
            facets_value = str(config["facets"]).strip()
            if facets_value:
                params["facets"] = facets_value

        # Optional parameters for search endpoint
        if not count_only:
            if "page" in config and config["page"] is not None:
                try:
                    page = int(config["page"])
                    if page > 0:
                        params["page"] = page
                except (ValueError, TypeError):
                    pass
            minify_effective = minify

            if "fields" in config and config["fields"]:
                fields_value = str(config["fields"]).strip()
                if fields_value:
                    params["fields"] = fields_value
                    # Shodan API constraint: fields and minify=true are mutually exclusive
                    minify_effective = False

            params["minify"] = "true" if minify_effective else "false"

        try:
            if count_only:
                response = requests.get(url, params=params, timeout=30)
                response.raise_for_status()
                result_data = response.json()

                if isinstance(result_data, dict) and result_data.get("error"):
                    error_result = {
                        "status": "error",
                        "message": f"Shodan API error: {result_data.get('error', 'Unknown error')}",
                        "suggestion": "Please check your API key, query syntax, and account query credits"
                    }
                    print(json.dumps(error_result, ensure_ascii=False, indent=2))
                    sys.exit(1)

                output = {
                    "status": "success",
                    "mode": "count",
                    "query": query,
                    "total": result_data.get("total", 0),
                    "facets": result_data.get("facets", {}),
                    "size": requested_size,
                    "note": "Count mode only returns statistics, no detailed results",
                    "message": "Count query completed (no asset details returned)"
                }
            else:
                start_page = int(params.get("page", 1))
                # Shodan search returns a fixed maximum of 100 results per page
                # If size is not specified, keep original behavior (single page)
                target_size = requested_size if requested_size else 100
                pages_needed = 1 if not requested_size else max(1, int(math.ceil(target_size / 100.0)))

                all_matches = []
                last_result_data = {}
                current_page = start_page
                pages_fetched = 0

                for _ in range(pages_needed):
                    page_params = dict(params)
                    page_params["page"] = current_page

                    response = requests.get(url, params=page_params, timeout=30)
                    response.raise_for_status()
                    result_data = response.json()
                    last_result_data = result_data if isinstance(result_data, dict) else {}
                    pages_fetched += 1

                    if isinstance(last_result_data, dict) and last_result_data.get("error"):
                        error_result = {
                            "status": "error",
                            "message": f"Shodan API error: {last_result_data.get('error', 'Unknown error')}",
                            "suggestion": "Please check your API key, query syntax, and account query credits"
                        }
                        print(json.dumps(error_result, ensure_ascii=False, indent=2))
                        sys.exit(1)

                    page_matches = last_result_data.get("matches", []) if isinstance(last_result_data, dict) else []
                    if not page_matches:
                        break

                    all_matches.extend(page_matches)
                    if len(all_matches) >= target_size:
                        break
                    current_page += 1

                matches = all_matches[:target_size]
                output = {
                    "status": "success",
                    "mode": "search",
                    "query": query,
                    "page": start_page,
                    "size": target_size,
                    "pages_fetched": pages_fetched,
                    "total": last_result_data.get("total", 0),
                    "results_count": len(matches),
                    "facets": last_result_data.get("facets", {}),
                    "results": matches,
                    "message": f"Successfully retrieved {len(matches)} results"
                }

            print(json.dumps(output, ensure_ascii=False, indent=2))

        except requests.exceptions.RequestException as e:
            response_body = ""
            status_code = None
            if hasattr(e, "response") and e.response is not None:
                status_code = e.response.status_code
                try:
                    response_body = e.response.text[:500]
                except Exception:
                    response_body = ""

            error_result = {
                "status": "error",
                "message": f"Request failed: {str(e)}",
                "status_code": status_code,
                "response": response_body,
                "suggestion": "Please check your network connection, Shodan API status, API key, and query credits"
            }
            print(json.dumps(error_result, ensure_ascii=False, indent=2))
            sys.exit(1)

    except Exception as e:
        error_result = {
            "status": "error",
            "message": f"Execution error: {str(e)}",
            "type": type(e).__name__
        }
        print(json.dumps(error_result, ensure_ascii=False, indent=2))
        sys.exit(1)
enabled: false
short_description: "Shodan internet-connected device search engine client"
description: |
  Shodan asset search tool, based on the official Developer API, supporting quick search and statistical analysis.

  **Key Features:**
  - Use `/shodan/host/search` for asset search
  - Use `/shodan/host/count` for statistics without details (saves query credits)
  - Support controlling the number of returned results via `size` (automatic pagination aggregation)
  - Support pagination (page)
  - Support facet statistics (facets)
  - Support result field trimming (fields)
  - Support `minify` to control response data volume

  **Authentication Method:**
  - Query parameter uses `key`
  - You can fill in `SHODAN_API_KEY` in this file, or inject via the environment variable `SHODAN_API_KEY`

  **Query Syntax Examples:**
  - `product:nginx`
  - `apache country:DE`
  - `port:22`
  - `org:"Amazon" port:443`
  - `ssl.cert.subject.cn:example.com`

  **Notes:**
  - Queries with filters typically consume query credits
  - Pagination (beyond page 1) consumes additional credits
  - When `size` is greater than 100, more pages are automatically requested (maximum 100 per page)
  - Maximum `size` limit is 1000 (to prevent excessive requests)
  - `count_only=true` uses the statistics endpoint, does not return match details
parameters:
  - name: "query"
    type: "string"
    description: |
      Shodan search query (required).

      Supports Shodan filter syntax (`filter:value`) and keyword combinations.
      Examples:
      - `product:nginx`
      - `apache country:DE`
      - `port:22`
      - `org:"Amazon" port:443`
    required: true
    position: 1
    format: "positional"
  - name: "page"
    type: "int"
    description: |
      Page number (optional, only effective in search mode), starting from 1, default 1.
    required: false
    position: 2
    format: "positional"
    default: 1
  - name: "facets"
    type: "string"
    description: |
      Facet statistics fields (optional).

      Multiple fields are comma-separated, you can also specify counts:
      - `org,os`
      - `country:20,org:10`
    required: false
    position: 3
    format: "positional"
  - name: "minify"
    type: "bool"
    description: |
      Whether to minimize returned fields (optional, only effective in search mode).
      Default is `true`.
    required: false
    position: 4
    format: "positional"
    default: true
  - name: "fields"
    type: "string"
    description: |
      Specify return fields (optional, only effective in search mode).

      Multiple fields are comma-separated, for example:
      - `ip_str,port,org,hostnames,http.title`
      - `tags,http.title,http.favicon.hash`
    required: false
    position: 5
    format: "positional"
  - name: "count_only"
    type: "bool"
    description: |
      Whether to count total only (optional).

      - `false` (default): Run `/shodan/host/search` to return details
      - `true`: Run `/shodan/host/count` to return only total and facets
    required: false
    position: 6
    format: "positional"
    default: false
  - name: "size"
    type: "int"
    description: |
      Number of results to return (optional, only effective in search mode).

      - Supports `10 / 20 / 100 / n`
      - Shodan returns a maximum of 100 per page, when exceeding 100 pages are automatically fetched and concatenated
      - To avoid quota and latency issues, the maximum value is limited to 1000
      - When not specified, defaults to returning a single page of results (maximum 100)
    required: false
    position: 7
    format: "positional"
