name: "linpeas"
command: "linpeas.sh"
enabled: true
short_description: "Linux privilege escalation enumeration script"
description: |
  LinPEAS (Linux Privilege Escalation Awesome Script) is an automated privilege escalation enumeration script, used for detecting common privilege escalation paths in Linux systems.

  **Key Features:**
  - System information gathering
  - Permission and group checks
  - Writable file and directory detection
  - SUID/SGID file search
  - Environment variable checks
  - Scheduled task analysis
  - Network configuration checks
  - Sensitive file search

  **Use Cases:**
  - Privilege escalation in penetration testing
  - Security audit
  - Post-exploitation testing
  - CTF competitions

  **Notes:**
  - Requires the linpeas.sh script to be downloaded on the target system
  - Execution time may be long
  - Large volume of output, recommended to save to file
parameters:
  - name: "output"
    type: "string"
    description: "Output file path (optional) "
    required: false
    flag: "-o"
    format: "flag"
  - name: "fast"
    type: "bool"
    description: "Fast mode, skip time-consuming checks"
    required: false
    flag: "-fast"
    format: "flag"
  - name: "additional_args"
    type: "string"
    description: |
      Additional linpeas parameters. Used to pass linpeas options not defined in the parameter list.

      **Example Values:**
      - Add common parameter examples based on the tool

      **Notes:**
      - Separate multiple parameters with spaces
      - Ensure correct parameter format to avoid command injection
      - This parameter is appended directly to the end of the command
    required: false
    format: "positional"
