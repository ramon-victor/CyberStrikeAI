name: "nmap"
command: "nmap"
# Default: TCP connect scan + version detection + default NSE scripts (works without root)
args: ["-sT", "-sV", "-sC"]
enabled: true
short_description: "Network scanning: ports/services/scripts; optional timing, custom NSE, OS detection (requires root)"
description: |
  Network mapping and port scanning.

  **Default behavior (just pass target/ports):**
  - `-sT` TCP connect scan (no root required)
  - `-sV` Version detection
  - `-sC` Default NSE scripts

  **Optional enhancements:**
  - `timing`: `-T0` through `-T5` timing templates
  - `nse_scripts`: `--script` custom scripts (e.g. `vuln`, `http-*`)
  - `os_detection`: `-O` **requires root**; otherwise nmap will QUIT
  - `aggressive`: `-A` **requires root** (includes OS detection)
  - `scan_type`: If provided, this **completely replaces** the above default `-sT -sV -sC`; you must write the needed options yourself (e.g. `-sT -sV`)

  **Notes:**
  - `-sS` SYN scan requires root; without root, use default or `-sT`
  - Scanning all ports `1-65535` is very slow; common ports are recommended first
  - Ensure you have authorization to scan the target
parameters:
  - name: "target"
    type: "string"
    description: |
      Target IP, hostname, CIDR, or domain name; URLs will automatically extract the host portion.

      **Examples:** `192.168.1.1`, `10.0.0.0/24`, `example.com`
    required: true
    position: 1
    format: "positional"
  - name: "ports"
    type: "string"
    description: |
      Port range. Examples: `80`, `1-1000`, `80,443,8080`, `1-65535` (full port range is very slow)
    required: false
    flag: "-p"
    format: "flag"
  - name: "timing"
    type: "string"
    description: "Timing template T0–T5; higher number means faster. Examples: `4` generates `-T4`"
    required: false
    format: "template"
    template: "-T{value}"
  - name: "nse_scripts"
    type: "string"
    description: "NSE scripts, passed to `--script`. Examples: `vuln`, `http-title,http-headers`"
    required: false
    flag: "--script"
    format: "flag"
  - name: "os_detection"
    type: "bool"
    description: |
      Enable `-O` OS detection. **Requires root**; without root, keep false.
    required: false
    flag: "-O"
    format: "flag"
    default: false
  - name: "aggressive"
    type: "bool"
    description: |
      Enable `-A` aggressive scan (includes OS detection). **Requires root**; without root, keep false.
    required: false
    flag: "-A"
    format: "flag"
    default: false
  - name: "scan_type"
    type: "string"
    description: |
      Scan type options; **if provided, replaces the default `-sT -sV -sC`**; only your specified options are kept.
      Separate multiple options with spaces, for example: `-sT -sV`, `-sU` (UDP).
    required: false
    format: "template"
    template: "{value}"
  - name: "additional_args"
    type: "string"
    description: |
      Additional parameters, appended to the end of the command separated by spaces.
      Examples: `--max-retries 3`, `-v`, `-Pn`
    required: false
    format: "positional"
