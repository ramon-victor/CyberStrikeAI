name: "wpscan"
command: "wpscan"
enabled: true
# List of allowed exit codes: wpscan returns exit code 4 when the target is not a WordPress site, which is normal informational output
allowed_exit_codes: [4]
short_description: "WordPress vulnerability scanner"
description: |
  WPScan is a tool specifically designed for WordPress security scanning, capable of detecting theme, plugin, and core vulnerabilities.

  **Key Features:**
  - WordPress core vulnerability detection
  - Theme and plugin vulnerability scanning
  - User enumeration
  - Password brute forcing
  - Security configuration checking

  **Use Cases:**
  - WordPress security assessment
  - Vulnerability scanning
  - Penetration testing
  - Security audit
parameters:
  - name: "url"
    type: "string"
    description: "WordPress site URL"
    required: true
    flag: "--url"
    format: "flag"
  - name: "additional_args"
    type: "string"
    description: "Additional WPScan arguments"
    required: false
    format: "positional"
