name: "waybackurls"
command: "waybackurls"
enabled: true
short_description: "Wayback Machine URL collector"
description: |
  Waybackurls fetches historical URLs for a target domain from the Wayback Machine.

  **Key Features：**
  - Historical URL discovery
  - Version retrieval
  - Subdomain support

  **Use Cases：**
  - Historical URL collection
  - Bug bounty reconnaissance
  - Security testing
  - Content discovery
parameters:
  - name: "domain"
    type: "string"
    description: "Target domain"
    required: true
    position: 0
    format: "positional"
  - name: "get_versions"
    type: "bool"
    description: "Get URLs for all versions"
    required: false
    flag: "-get-versions"
    format: "flag"
    default: false
  - name: "no_subs"
    type: "bool"
    description: "Do not include subdomains"
    required: false
    flag: "-no-subs"
    format: "flag"
    default: false
  - name: "additional_args"
    type: "string"
    description: |
      Additional waybackurls arguments. Used to pass waybackurls options not defined in the parameter list.

      **Example Values：**
      - Add common parameter examples based on the tool

      **Notes：**
      - Separate multiple parameters with spaces
      - Ensure correct parameter format to avoid command injection
      - This parameter is appended directly to the end of the command
    required: false
    format: "positional"
