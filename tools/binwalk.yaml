name: "binwalk"
command: "binwalk"
enabled: true
short_description: "Firmware and file analysis tool"
description: |
  Binwalk is a firmware analysis tool for analyzing, extracting, and reverse-engineering firmware images.

  **Key Features:**
  - File signature recognition
  - File extraction
  - Entropy analysis
  - Firmware analysis

  **Use Cases:**
  - Firmware analysis
  - File format identification
  - Data extraction
  - Reverse engineering
parameters:
  - name: "file_path"
    type: "string"
    description: "File path to analyze"
    required: true
    position: 0
    format: "positional"
  - name: "extract"
    type: "bool"
    description: "Extract discovered files"
    required: false
    flag: "-e"
    format: "flag"
  - name: "additional_args"
    type: "string"
    description: |
      Additional binwalk parameters for passing options not listed above.

      **Notes:**
      - Separate multiple parameters with spaces
      - Ensure correct parameter format to avoid command injection
    required: false
    format: "positional"
