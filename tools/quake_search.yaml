name: "quake_search"
command: "python3"
args:
  - "-c"
  - |
    import sys
    import json
    import requests
    import os

    # ==================== Quake Configuration ====================
    # Please configure your Quake API Token here
    # You can also set it via the environment variable: QUAKE_API_KEY
    # enabled by default is false, must be enabled to run this MCP
    QUAKE_API_KEY = "" # Please fill in your Quake API Token
    # ==================================================

    # Quake API base URL
    base_url = "https://quake.360.cn/api/v3/search/quake_service"

    # Parse arguments (from JSON string or command line arguments)
    def parse_args():
        # Try to read JSON configuration from the first argument
        if len(sys.argv) > 1:
            try:
                arg1 = str(sys.argv[1])
                config = json.loads(arg1)
                if isinstance(config, dict):
                    return config
            except (json.JSONDecodeError, TypeError, ValueError):
                pass

        # Traditional positional arguments (backward compatible)
        # Argument positions: query=1, size=2, start=3, fields=4, latest=5
        config = {}
        if len(sys.argv) > 1:
            config["query"] = str(sys.argv[1])
        if len(sys.argv) > 2:
            try:
                config["size"] = int(sys.argv[2])
            except (ValueError, TypeError):
                pass
        if len(sys.argv) > 3:
            try:
                config["start"] = int(sys.argv[3])
            except (ValueError, TypeError):
                pass
        if len(sys.argv) > 4:
            config["fields"] = str(sys.argv[4])
        if len(sys.argv) > 5:
            val = sys.argv[5]
            if isinstance(val, str):
                config["latest"] = val.lower() in ("true", "1", "yes")
            else:
                config["latest"] = bool(val)
        return config

    # Normalize fields parameter: supports strings and arrays
    def normalize_fields(fields_value):
        if fields_value is None:
            return None

        if isinstance(fields_value, str):
            raw = fields_value.strip()
            if not raw:
                return None
            return [x.strip() for x in raw.split(",") if x.strip()]

        if isinstance(fields_value, list):
            output = []
            for item in fields_value:
                text = str(item).strip()
                if text:
                    output.append(text)
            return output or None

        return None

    try:
        config = parse_args()

        if not isinstance(config, dict):
            error_result = {
                "status": "error",
                "message": f"Argument parsing error: expected dict type, but got {type(config).__name__}",
                "type": "TypeError"
            }
            print(json.dumps(error_result, ensure_ascii=False, indent=2))
            sys.exit(1)

        api_key = os.getenv("QUAKE_API_KEY", QUAKE_API_KEY).strip()
        query = str(config.get("query", "")).strip()

        if not api_key:
            error_result = {
                "status": "error",
                "message": "Missing Quake configuration: api_key (Quake API Token) ",
                "required_config": ["api_key"],
                "note": "Please fill in the Token in the QUAKE_API_KEY configuration item in the YAML file, or set it in the environment variable QUAKE_API_KEY. The Token can be obtained from the Quake user center."
            }
            print(json.dumps(error_result, ensure_ascii=False, indent=2))
            sys.exit(1)

        if not query:
            error_result = {
                "status": "error",
                "message": "Missing required parameter: query (search query string) ",
                "required_params": ["query"],
                "examples": [
                    'domain:"example.com"',
                    'ip:"1.1.1.1"',
                    'port:443',
                    'service.name:"http"',
                    'port:22 AND country_cn:"China"'
                ]
            }
            print(json.dumps(error_result, ensure_ascii=False, indent=2))
            sys.exit(1)

        # Build request body
        data = {
            "query": query
        }

        # Optional parameter size (typically max 100)
        if "size" in config and config["size"] is not None:
            try:
                size = int(config["size"])
                if size > 0:
                    data["size"] = size
            except (ValueError, TypeError):
                pass

        # Optional parameter start (pagination offset, default 0)
        if "start" in config and config["start"] is not None:
            try:
                start = int(config["start"])
                if start >= 0:
                    data["start"] = start
            except (ValueError, TypeError):
                pass

        # fields maps to Quake's include field
        include_fields = normalize_fields(config.get("fields"))
        if include_fields:
            data["include"] = include_fields

        # latest parameter, default true (fetch latest index results)
        latest_value = config.get("latest", True)
        if isinstance(latest_value, bool):
            data["latest"] = latest_value
        elif isinstance(latest_value, str):
            data["latest"] = latest_value.lower() in ("true", "1", "yes")
        elif isinstance(latest_value, (int, float)):
            data["latest"] = latest_value != 0
        else:
            data["latest"] = True

        headers = {
            "X-QuakeToken": api_key,
            "Content-Type": "application/json"
        }

        try:
            response = requests.post(base_url, json=data, headers=headers, timeout=30)
            response.raise_for_status()
            result_data = response.json()

            # Quake API code==0 indicates success
            if result_data.get("code") != 0:
                error_result = {
                    "status": "error",
                    "message": f"Quake API error: {result_data.get('message', 'Unknown error')}",
                    "error_code": result_data.get("code", "unknown"),
                    "suggestion": "Please check if the API Token, query syntax, and account credits are normal"
                }
                print(json.dumps(error_result, ensure_ascii=False, indent=2))
                sys.exit(1)

            results = result_data.get("data", [])
            meta = result_data.get("meta", {})
            pagination = meta.get("pagination", {}) if isinstance(meta, dict) else {}

            output = {
                "status": "success",
                "query": query,
                "size": data.get("size", pagination.get("size", len(results))),
                "start": data.get("start", pagination.get("page_index", 0)),
                "total": result_data.get("total_count", pagination.get("total", 0)),
                "results_count": len(results),
                "fields": include_fields or "all",
                "results": results,
                "message": f"Successfully retrieved {len(results)} results"
            }

            print(json.dumps(output, ensure_ascii=False, indent=2))

        except requests.exceptions.RequestException as e:
            error_result = {
                "status": "error",
                "message": f"Request failed: {str(e)}",
                "suggestion": "Please check network connectivity or Quake API service status"
            }
            print(json.dumps(error_result, ensure_ascii=False, indent=2))
            sys.exit(1)

    except Exception as e:
        error_result = {
            "status": "error",
            "message": f"Execution error: {str(e)}",
            "type": type(e).__name__
        }
        print(json.dumps(error_result, ensure_ascii=False, indent=2))
        sys.exit(1)
enabled: false
short_description: "Quake network asset search engine client, supporting custom query, size, fields"
description: |
  Quake (360 Cyber Asset Mapping) asset search tool, runs Quake API v3 for real-time internet asset retrieval.

  **Key Features:**
  - Supports Quake DSL query syntax (query)
  - Supports return count control (size)
  - Supports field trimming (fields, maps to Quake include)
  - Supports pagination offset (start)

  **Authentication:**
  - Header uses `X-QuakeToken`
  - You can fill in `QUAKE_API_KEY` in this file, or inject it via the environment variable `QUAKE_API_KEY`

  **Common Query Examples:**
  - `domain:"example.com"`
  - `ip:"1.1.1.1"`
  - `port:443`
  - `service.name:"http" AND country_cn:"China"`

  **Notes:**
  - API usage consumes credits, please control `size` as needed
  - `fields` maps to the `include` field in the request body, multiple fields are comma-separated
  - If you encounter syntax errors, please verify the DSL in the Quake console first
parameters:
  - name: "query"
    type: "string"
    description: |
      Quake DSL query string (required).

      **Examples:**
      - `domain:"example.com"`
      - `ip:"1.1.1.1"`
      - `port:443`
      - `service.name:"http" AND country_cn:"China"`
    required: true
    position: 1
    format: "positional"
  - name: "size"
    type: "int"
    description: |
      Number of results to return (optional).

      Recommended range: 1-100 (subject to account permissions and API limits).
    required: false
    position: 2
    format: "positional"
    default: 10
  - name: "start"
    type: "int"
    description: |
      Pagination start offset (optional), starting from 0.
    required: false
    position: 3
    format: "positional"
    default: 0
  - name: "fields"
    type: "string"
    description: |
      Return fields (optional), multiple fields are comma-separated.

      This parameter maps to the `include` field in the Quake request body.
      **Examples:**
      - `ip,port`
      - `ip,port,service.name,service.http.title,location.country_cn`
    required: false
    position: 4
    format: "positional"
    default: "ip,port"
  - name: "latest"
    type: "bool"
    description: |
      Whether to prioritize returning the latest index results (optional).

      Default `true`.
    required: false
    position: 5
    format: "positional"
    default: true
