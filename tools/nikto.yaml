name: "nikto"
command: "nikto"
enabled: true
# Allowed exit codes list: nikto returns exit code 1 when vulnerabilities are found, which is a normal success state
allowed_exit_codes: [1]
# Short description (used in tool listings to reduce token consumption)
short_description: "Web server vulnerability scanner"
# Detailed tool description
description: |
  Web server vulnerability scanner, used for detecting known vulnerabilities, misconfigurations, and potential security issues in web servers and applications.

  **Key Features:**
  - Detect web server version and configuration issues
  - Identify known web vulnerabilities and CVEs
  - Detect dangerous files and directories
  - Check server misconfigurations
  - Identify outdated software versions
  - Detect default files and scripts

  **Use Cases:**
  - Web application security assessment
  - Server configuration audit
  - Vulnerability scanning and discovery
  - Pre-engagement information gathering for penetration testing

  **Notes:**
  - Scans may generate large amounts of logs; be mindful of log management
  - Some scans may trigger WAF or IDS alerts
  - Recommended to use only within authorized scope
  - Scan results require manual verification
# Parameter definitions
parameters:
  - name: "target"
    type: "string"
    description: |
      Target URL or IP address. Can be a full URL or an IP address.

      **Format requirements:**
      - Can include protocol (http:// or https://)
      - Can provide just an IP address or domain name
      - If only an IP is provided, http protocol is used by default

      **Example Values:**
      - Full URL: "http://example.com"
      - HTTPS: "https://example.com"
      - IP address: "192.168.1.1"
      - With port: "http://example.com:8080"
      - With path: "http://example.com/admin"

      **Notes:**
      - If only an IP is provided, the tool will use http protocol
      - It is recommended to provide a full URL to ensure correct scanning
      - Required parameter, must not be empty
    required: true
    flag: "-h"
    format: "flag"
  - name: "additional_args"
    type: "string"
    description: |
      Additional nikto parameters. Used to pass nikto options not defined in the parameter list.

      **Example Values:**
      - Add common parameter examples based on the tool

      **Notes:**
      - Separate multiple parameters with spaces
      - Ensure correct parameter format to avoid command injection
      - This parameter is appended directly to the end of the command
    required: false
    format: "positional"
