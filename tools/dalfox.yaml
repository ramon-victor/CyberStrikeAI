name: "dalfox"
command: "dalfox"
# dalfox v2+ uses subcommands, single-target mode is `dalfox url <target>`, root-level -u is no longer supported
args:
  - "url"
enabled: true
short_description: "Advanced XSS vulnerability scanner"
description: |
  Dalfoxis an advanced XSS vulnerability scanner, supporting multiple XSS detection techniques.

  **Key Features:**
  - XSS vulnerability detection
  - Blind XSS testing
  - DOM mining
  - Dictionary mining

  **Use Cases:**
  - XSS vulnerability testing
  - Web application security testing
  - Bug bounty reconnaissance
  - Security testing
parameters:
  - name: "url"
    type: "string"
    description: |
      Target URL. Dalfox single-target mode uses the url subcommand; this is passed as the first positional argument after url.
      Example CLI: dalfox url "http://target/page?q=test"
    required: true
    position: 0
    format: "positional"
  - name: "pipe_mode"
    type: "bool"
    description: "Use pipe mode for input"
    required: false
    flag: "--pipe"
    format: "flag"
    default: false
  - name: "blind"
    type: "string"
    description: "Blind XSS callback URL (e.g., Burp Collaborator URL)"
    required: false
    flag: "--blind"
    format: "flag"
  - name: "mining_dom"
    type: "bool"
    description: "Enable DOM mining"
    required: false
    flag: "--mining-dom"
    format: "flag"
    default: true
  - name: "mining_dict"
    type: "bool"
    description: "Enable dictionary mining"
    required: false
    flag: "--mining-dict"
    format: "flag"
    default: true
  - name: "additional_args"
    type: "string"
    description: |
      Additional dalfox parameters. Used to pass dalfox options not defined in the parameter list.

      **Example Values:**
      - Add common parameter examples based on the tool

      **Notes:**
      - Separate multiple parameters with spaces
      - Ensure correct parameter format to avoid command injection
      - This parameter is appended directly to the end of the command
    required: false
    format: "positional"
