name: "katana"
command: "katana"
enabled: true
short_description: "Next-generation web crawler and URL discovery tool"
description: |
  Katana is a fast, intelligent web crawler tool, used for discovering endpoints and resources in web applications.

  **Key Features:**
  - Intelligent web crawling
  - JavaScript rendering support
  - Form extraction
  - Endpoint discovery

  **Use Cases:**
  - Web application reconnaissance
  - Endpoint discovery
  - Content crawling
  - Security testing
parameters:
  - name: "url"
    type: "string"
    description: "Target URL"
    required: true
    flag: "-u"
    format: "flag"
  - name: "depth"
    type: "int"
    description: "Crawling depth"
    required: false
    flag: "-d"
    format: "flag"
    default: 3
  - name: "js_crawl"
    type: "bool"
    description: "Enable JavaScript crawling"
    required: false
    flag: "-jc"
    format: "flag"
    default: true
  - name: "form_extraction"
    type: "bool"
    description: "Enable form extraction"
    required: false
    flag: "-forms"
    format: "flag"
    default: true
  - name: "additional_args"
    type: "string"
    description: |
      Additional Katana arguments. Used to pass Katana options not defined in the parameter list.

      **Example Values:**
      - "--headless": Use headless browser
      - "-f": Output format
      - "-o output.txt": Output to file
      - "-c": Concurrency level

      **Notes:**
      - Separate multiple parameters with spaces
      - Ensure correct parameter format to avoid command injection
      - This parameter is appended directly to the end of the command
    required: false
    format: "positional"
