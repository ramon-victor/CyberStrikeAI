name: "jaeles"
command: "jaeles"
args: ["scan"]
enabled: true
short_description: "Web vulnerability scanner and detection tool"
description: |
  Jaeles is an advanced vulnerability scanner that supports custom signatures for vulnerability detection.

  **Key Features:**
  - Custom signature support
  - Multiple vulnerability detection methods
  - Fast scanning
  - Detailed reports

  **Use Cases:**
  - Vulnerability scanning
  - Web application security testing
  - Custom detection rules
  - Security testing
parameters:
  - name: "url"
    type: "string"
    description: "Target URL"
    required: true
    flag: "-u"
    format: "flag"
  - name: "signatures"
    type: "string"
    description: "Custom signature path"
    required: false
    flag: "-s"
    format: "flag"
  - name: "config"
    type: "string"
    description: "Configuration file"
    required: false
    flag: "-c"
    format: "flag"
  - name: "threads"
    type: "int"
    description: "Number of threads"
    required: false
    flag: "-t"
    format: "flag"
    default: 20
  - name: "timeout"
    type: "int"
    description: "Request timeout in seconds"
    required: false
    flag: "--timeout"
    format: "flag"
    default: 20
  - name: "additional_args"
    type: "string"
    description: |
      Additional jaeles arguments. Used to pass jaeles options not defined in the parameter list.

      **Example Values:**
      - Add common parameter examples based on the tool

      **Notes:**
      - Separate multiple parameters with spaces
      - Ensure correct parameter format to avoid command injection
      - This parameter is appended directly to the end of the command
    required: false
    format: "positional"
