name: "install-python-package"
command: "/bin/bash"
args:
  - "-c"
  - |
    set -euo pipefail

    PACKAGE="$1"
    ENV_NAME="${2:-default}"
    ADDITIONAL_ARGS="${3:-}"

    BASE_DIR="${HOME}/.cyberstrike/venvs"

    detect_project_root() {
      if [ -n "${CYBERSTRIKE_ROOT:-}" ] && [ -d "${CYBERSTRIKE_ROOT}" ]; then
        printf '%s\n' "${CYBERSTRIKE_ROOT}"
        return
      fi
      if command -v git >/dev/null 2>&1; then
        local root_path
        if root_path=$(git rev-parse --show-toplevel 2>/dev/null); then
          printf '%s\n' "$root_path"
          return
        fi
      fi
      printf '%s\n' "$(pwd)"
    }

    resolve_env_dir() {
      local requested="$1"
      if [ -n "${VIRTUAL_ENV:-}" ] && { [ -z "$requested" ] || [ "$requested" = "default" ]; }; then
        printf '%s\n' "$VIRTUAL_ENV"
        return
      fi
      if [ -z "$requested" ] || [ "$requested" = "default" ]; then
        local root
        root="$(detect_project_root)"
        printf '%s/venv\n' "$root"
        return
      fi
      printf '%s/%s\n' "$BASE_DIR" "$requested"
    }

    ENV_DIR="$(resolve_env_dir "$ENV_NAME")"
    mkdir -p "$(dirname "$ENV_DIR")"
    if [ ! -d "$ENV_DIR" ]; then
      python3 -m venv "$ENV_DIR"
    fi

    # shellcheck disable=SC1090
    source "$ENV_DIR/bin/activate"

    if [ -n "$ADDITIONAL_ARGS" ]; then
      pip install "$PACKAGE" $ADDITIONAL_ARGS
    else
      pip install "$PACKAGE"
    fi
  - "_"
enabled: true
short_description: "Install Python packages in virtual environments"
description: |
  Install Python packages in a virtual environment.

  **Key Features:**
  - Install Python packages
  - Virtual environment support
  - Dependency management

  **Use Cases:**
  - Environment setup
  - Dependency installation
  - Tool installation
parameters:
  - name: "package"
    type: "string"
    description: "Name of the Python package to install"
    required: true
    position: 0
    format: "positional"
  - name: "env_name"
    type: "string"
    description: "Virtual environment name (default: default)"
    required: false
    default: "default"
    position: 1
    format: "positional"
  - name: "additional_args"
    type: "string"
    description: |
      Additional pip install arguments. Used to pass pip install options not defined in the parameter list.

      **Example Values:**
      - Add common parameter examples based on the tool

      **Notes:**
      - Separate multiple parameters with spaces
      - Ensure correct parameter format to avoid command injection
      - This parameter is appended directly to the end of the command
    required: false
    format: "positional"
    default: ""
