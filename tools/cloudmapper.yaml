name: "cloudmapper"
command: "cloudmapper"
enabled: true
short_description: "AWS network visualization and security analysis tool"
description: |
  CloudMapper is an AWS network visualization and security analysis tool.

  **Key Features:**
  - AWS network visualization
  - Security analysis
  - Network mapping
  - Admin finder

  **Use Cases:**
  - AWS network analysis
  - Security assessment
  - Network visualization
  - Security audit
parameters:
  - name: "action"
    type: "string"
    description: "Action to perform (collect, prepare, webserver, find_admins, etc.)"
    required: false
    default: "collect"
    position: 0
    format: "positional"
  - name: "account"
    type: "string"
    description: "AWS account to analyze"
    required: false
    flag: "--account"
    format: "flag"
  - name: "config"
    type: "string"
    description: "Configuration file path"
    required: false
    flag: "--config"
    format: "flag"
  - name: "additional_args"
    type: "string"
    description: |
      Additional cloudmapper parameters for passing options not listed above.

      **Notes:**
      - Separate multiple parameters with spaces
    required: false
    format: "positional"
