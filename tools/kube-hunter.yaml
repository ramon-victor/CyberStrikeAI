name: "kube-hunter"
command: "kube-hunter"
enabled: true
short_description: "Kubernetes vulnerability and security auditing tool"
description: |
  Kube-hunter is a Kubernetes penetration testing tool, used for discovering security issues in Kubernetes clusters.

  **Key Features:**
  - Kubernetes security scanning
  - Vulnerability discovery
  - Configuration issue detection
  - Active and passive modes

  **Use Cases:**
  - Kubernetes security testing
  - Cluster security assessment
  - Penetration testing
  - Security audit
parameters:
  - name: "target"
    type: "string"
    description: "Specific target scanning"
    required: false
    flag: "--remote"
    format: "flag"
  - name: "cidr"
    type: "string"
    description: "CIDR range scanning"
    required: false
    flag: "--cidr"
    format: "flag"
  - name: "interface"
    type: "string"
    description: "Network interface scanning"
    required: false
    flag: "--interface"
    format: "flag"
  - name: "active"
    type: "bool"
    description: "Enable active scanning (may be risky) "
    required: false
    flag: "--active"
    format: "flag"
    default: false
  - name: "report"
    type: "string"
    description: "Report format (json, yaml) "
    required: false
    flag: "--report"
    format: "flag"
    default: "json"
  - name: "additional_args"
    type: "string"
    description: |
      Additional kube-hunter parameters. Used to pass kube-hunter options not defined in the parameter list.

      **Example Values:**
      - Add common parameter examples based on the tool

      **Notes:**
      - Separate multiple parameters with spaces
      - Ensure correct parameter format to avoid command injection
      - This parameter is appended directly to the end of the command
    required: false
    format: "positional"
