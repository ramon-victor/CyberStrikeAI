name: "smbmap"
command: "smbmap"
enabled: true
short_description: "SMB share enumeration and access testing tool"
description: |
  SMBMap is a tool for enumerating SMB shares and providing file access capabilities.

  **Key Features:**
  - SMB share enumeration
  - File listing and downloading
  - Permission checking
  - Support for multiple authentication methods

  **Use Cases:**
  - SMB security testing
  - File sharing auditing
  - Penetration testing
  - Network reconnaissance
parameters:
  - name: "target"
    type: "string"
    description: "Target IP address"
    required: true
    flag: "-H"
    format: "flag"
  - name: "username"
    type: "string"
    description: "Username"
    required: false
    flag: "-u"
    format: "flag"
  - name: "password"
    type: "string"
    description: "Password"
    required: false
    flag: "-p"
    format: "flag"
  - name: "domain"
    type: "string"
    description: "Domain name"
    required: false
    flag: "-d"
    format: "flag"
  - name: "additional_args"
    type: "string"
    description: "Additional SMBMap parameters"
    required: false
    format: "positional"
