name: "checkov"
command: "checkov"
enabled: true
short_description: "Infrastructure-as-code security scanning tool"
description: |
  Checkov is a static code analysis tool for infrastructure-as-code (IaC) security scanning.

  **Key Features:**
  - Supports multiple IaC frameworks (Terraform, CloudFormation, Kubernetes, etc.)
  - Hundreds of built-in policies
  - Custom policy support
  - CI/CD integration

  **Use Cases:**
  - IaC security scanning
  - Cloud configuration audit
  - Security policy checks
  - Compliance checks
parameters:
  - name: "directory"
    type: "string"
    description: "Directory to scan"
    required: false
    flag: "-d"
    format: "flag"
  - name: "framework"
    type: "string"
    description: "Framework to scan (terraform, cloudformation, kubernetes, etc.)"
    required: false
    flag: "--framework"
    format: "flag"
  - name: "check"
    type: "string"
    description: "Specific checks to run"
    required: false
    flag: "--check"
    format: "flag"
  - name: "output"
    type: "string"
    description: "Output format (json, yaml, cli)"
    required: false
    flag: "--output"
    format: "flag"
  - name: "additional_args"
    type: "string"
    description: |
      Additional checkov parameters for passing options not listed above.

      **Notes:**
      - Separate multiple parameters with spaces
    required: false
    format: "positional"
