name: "checksec"
command: "checksec"
enabled: true
short_description: "Binary security feature check tool"
description: |
  Checksec is a tool for checking binary file security features.

  **Key Features:**
  - Security feature checks
  - Protection mechanism detection
  - Multi-architecture support
  - Detailed reports

  **Use Cases:**
  - Binary security analysis
  - Protection mechanism checks
  - Vulnerability research
  - Security assessment
parameters:
  - name: "binary"
    type: "string"
    description: "Binary file path to check"
    required: true
    position: 0
    format: "positional"
  - name: "additional_args"
    type: "string"
    description: |
      Additional checksec parameters for passing options not listed above.

      **Notes:**
      - Separate multiple parameters with spaces
      - Ensure correct parameter format to avoid command injection
      - This parameter is appended directly to the end of the command
    required: false
    format: "positional"
