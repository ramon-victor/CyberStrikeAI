name: "nbtscan"
command: "nbtscan"
enabled: true
short_description: "NetBIOS name scanner for local network discovery"
description: |
  Nbtscan is a NetBIOS name scanning tool, used for discovering Windows systems on the network.

  **Key Features:**
  - NetBIOS name scanning
  - Windows system discovery
  - Network mapping
  - Fast scanning

  **Use Cases:**
  - Windows network discovery
  - NetBIOS enumeration
  - Network mapping
  - Penetration testing
parameters:
  - name: "target"
    type: "string"
    description: "Target IP address or range"
    required: true
    position: 0
    format: "positional"
  - name: "verbose"
    type: "bool"
    description: "Verbose output"
    required: false
    flag: "-v"
    format: "flag"
    default: false
  - name: "timeout"
    type: "int"
    description: "Timeout in seconds"
    required: false
    flag: "-t"
    format: "flag"
    default: 2
  - name: "additional_args"
    type: "string"
    description: |
      Additional nbtscan parameters. Used to pass nbtscan options not defined in the parameter list.

      **Example Values:**
      - Add common parameter examples based on the tool

      **Notes:**
      - Separate multiple parameters with spaces
      - Ensure correct parameter format to avoid command injection
      - This parameter is appended directly to the end of the command
    required: false
    format: "positional"
