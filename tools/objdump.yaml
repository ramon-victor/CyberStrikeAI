name: "objdump"
command: "objdump"
enabled: true
short_description: "Binary object file analysis and disassembly tool"
description: |
  Objdump is part of GNU binutils, used for disassembling binary files.

  **Key Features:**
  - Disassembly
  - Symbol table display
  - Section information display
  - Multi-architecture support

  **Use Cases:**
  - Binary analysis
  - Reverse engineering
  - Program understanding
  - Debugging assistance
parameters:
  - name: "binary"
    type: "string"
    description: "Path to the binary file to analyze"
    required: true
    position: 0
    format: "positional"
  - name: "disassemble"
    type: "bool"
    description: "Disassemble the binary file"
    required: false
    flag: "-d"
    format: "flag"
    default: true
  - name: "additional_args"
    type: "string"
    description: |
      Additional objdump parameters. Used to pass objdump options not defined in the parameter list.

      **Example Values:**
      - Add common parameter examples based on the tool

      **Notes:**
      - Separate multiple parameters with spaces
      - Ensure correct parameter format to avoid command injection
      - This parameter is appended directly to the end of the command
    required: false
    format: "positional"
