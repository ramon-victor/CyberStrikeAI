name: "steghide"
command: "steghide"
enabled: true
short_description: "Steganography tool for hiding and extracting data in images"
description: |
  Steghide is a steganography tool, used for hiding data in image and audio files.

  **Key Features:**
  - Data hiding
  - Data extraction
  - Information viewing
  - Password protection

  **Use Cases:**
  - Steganography analysis
  - Data hiding detection
  - Forensic analysis
  - CTF challenges
parameters:
  - name: "action"
    type: "string"
    description: "Action type (extract, embed, info)"
    required: true
    position: 0
    format: "positional"
  - name: "cover_file"
    type: "string"
    description: "Cover file path (use -cf for embed/info operations)"
    required: false
    flag: "-cf"
    format: "flag"
  - name: "embed_file"
    type: "string"
    description: "File to embed (for embed operation)"
    required: false
    flag: "-ef"
    format: "flag"
  - name: "passphrase"
    type: "string"
    description: "Password"
    required: false
    flag: "-p"
    format: "flag"
  - name: "stego_file"
    type: "string"
    description: "Stego file path (output for embed, input for extract)"
    required: false
    flag: "-sf"
    format: "flag"
  - name: "additional_args"
    type: "string"
    description: |
      Additional steghide parameters. Used to pass steghide options not defined in the parameter list.

      **Example Values:**
      - Add common parameter examples based on the tool

      **Notes:**
      - Separate multiple parameters with spaces
      - Ensure correct parameter format to avoid command injection
      - This parameter is appended directly to the end of the command
    required: false
    format: "positional"
