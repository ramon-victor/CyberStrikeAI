name: "metasploit"
command: "python3"
args:
  - "-c"
  - |
    import json
    import shlex
    import subprocess
    import sys

    if len(sys.argv) < 2:
        sys.stderr.write("Missing module name\n")
        sys.exit(1)

    module = sys.argv[1]
    options_raw = sys.argv[2] if len(sys.argv) > 2 else "{}"
    extra = sys.argv[3] if len(sys.argv) > 3 else ""

    try:
        options = json.loads(options_raw) if options_raw else {}
    except json.JSONDecodeError as exc:
        sys.stderr.write(f"Option parsing failed: {exc}\n")
        sys.exit(1)

    commands = [f"use {module}"]
    for key, value in options.items():
        commands.append(f"set {key} {value}")
    commands.append("run")
    commands.append("exit")

    cmd = ["msfconsole", "-q", "-x", "; ".join(commands)]
    if extra:
        cmd.extend(shlex.split(extra))

    subprocess.run(cmd, check=False)
enabled: true
short_description: "Metasploit penetration testing framework"
description: |
  Non-interactively execute modules via `msfconsole -q -x`. Module options can be provided in JSON format, and the script automatically builds `set` and `run` commands.
parameters:
  - name: "module"
    type: "string"
    description: "Metasploit module to use (e.g., exploit/windows/smb/ms17_010_eternalblue)"
    required: true
    position: 0
    format: "positional"
  - name: "options"
    type: "string"
    description: "Module options (JSON object, keys correspond to set commands)"
    required: false
    default: "{}"
    position: 1
    format: "positional"
  - name: "additional_args"
    type: "string"
    description: "Additional msfconsole arguments (appended to the end of the command)"
    required: false
    default: ""
    position: 2
    format: "positional"
