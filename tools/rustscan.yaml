name: "rustscan"
command: "rustscan"
enabled: true
short_description: "Ultra-fast port scanning tool"
description: |
  RustScan 2.x: Fast port discovery, optionally running Nmap scripts.

  **Corresponding to `rustscan -h` options:**
  - `-a` / `--addresses`: Scan target list (comma-separated or file)
  - `-p`: Comma-separated ports; `-r`: Port range `start-end` (use one or combine with `-p` per CLI behavior)
  - `-g` / `--greppable`: Only output ports, convenient for grep/piping
  - `--scripts`: **Official default is default** (runs Nmap); set to **none** for port discovery only, faster
  - `-b` batch-size, `-t` timeout, `--scan-order` etc. can fine-tune speed and order

  **Usage Tips:**
  - Quick port scan without Nmap: use `none` for scripts, add `-g` if needed
  - Need service detection/scripts: use `default` or `custom`, and ensure nmap is installed locally
parameters:
  # -a, --addresses
  - name: "target"
    type: "string"
    description: |
      Corresponds to `-a`: comma-separated CIDR, IP or hostname; can also be a file path containing newlines/lists.
      Examples: `192.168.1.1`, `10.0.0.1,10.0.0.2`, `192.168.0.0/24`
    required: true
    flag: "-a"
    format: "flag"

  # -p, --ports; for ranges use range (-r), do not put 1-1000 in ports
  - name: "ports"
    type: "string"
    description: |
      Ports to scan, **only** comma-separated list, corresponds to `-p`.
      Examples: `22,80,443`, `80,443,8080`.
      For ranges such as `1-1000`, use the **range** parameter (`-r`) instead, do not put them here.
    required: false
    flag: "-p"
    format: "flag"

  # -r, --range (use as alternative to ports list or combine per official docs)
  - name: "range"
    type: "string"
    description: |
      Port range, format start-end, corresponds to `-r`.
      Examples: `1-1000`, `1-65535` (full port range is very slow).
      For discrete ports such as `22,80,443`, use **ports** (`-p`) instead, do not put them here.
    required: false
    flag: "-r"
    format: "flag"

  # -u, --ulimit
  - name: "ulimit"
    type: "int"
    description: "Increase ulimit for scanning; adjust according to system fd limits"
    required: false
    flag: "-u"
    format: "flag"
    default: 5000

  # --scripts: none | default | custom (CLI default is default)
  - name: "scripts"
    type: "string"
    description: |
      Script level; **requires** a string value, do not pass true/false.
      - **none**: Do not run Nmap, port discovery only (fastest)
      - **default**: Consistent with rustscan official default, will invoke Nmap
      - **custom**: Custom scripts, often used with additional_args
    required: false
    flag: "--scripts"
    format: "flag"
    default: "none"
    options:
      - "none"
      - "default"
      - "custom"

  # -g, --greppable: port list only, no Nmap output
  - name: "greppable"
    type: "bool"
    description: "Greppable mode: only output ports, suitable for script parsing or writing to file"
    required: false
    flag: "-g"
    format: "flag"
    default: false

  # -b, --batch-size [default: 4500]
  - name: "batch_size"
    type: "int"
    description: "Number of concurrent ports per batch; larger is faster, limited by OS open file count. Official default 4500"
    required: false
    flag: "-b"
    format: "flag"

  # -t, --timeout ms [default: 1500]
  - name: "timeout_ms"
    type: "int"
    description: "Per-port timeout (milliseconds). Official default 1500"
    required: false
    flag: "-t"
    format: "flag"

  # --scan-order serial | random [default: serial]
  - name: "scan_order"
    type: "string"
    description: "Scan order: serial for ascending; random for randomized"
    required: false
    flag: "--scan-order"
    format: "flag"
    options:
      - "serial"
      - "random"

  # --top: top 1000 ports
  - name: "top_ports"
    type: "bool"
    description: "Use built-in top 1000 ports (equivalent to passing `--top`)"
    required: false
    flag: "--top"
    format: "flag"
    default: false

  # -e, --exclude-ports
  - name: "exclude_ports"
    type: "string"
    description: "Ports to exclude, comma-separated. Examples: `80,443`"
    required: false
    flag: "-e"
    format: "flag"

  # -x, --exclude-addresses
  - name: "exclude_addresses"
    type: "string"
    description: "Addresses to exclude, comma-separated CIDR/IP/hostname"
    required: false
    flag: "-x"
    format: "flag"

  # --tries [default: 1]
  - name: "tries"
    type: "int"
    description: "Number of retries before considering a port closed; 0 is corrected to 1"
    required: false
    flag: "--tries"
    format: "flag"

  - name: "additional_args"
    type: "string"
    description: |
      Options not listed above can be written here, space-separated.
      Examples: `--no-banner`, `--udp`, `-n` (ignore config file), `-c /path/config.toml`, `--resolver 8.8.8.8`
    required: false
    format: "positional"
