name: "subfinder"
command: "subfinder"
enabled: true
short_description: "Subdomain discovery tool"
description: |
  Subfinder is a passive subdomain discovery tool that discovers subdomains by querying multiple data sources.

  **Key Features:**
  - Passive subdomain discovery
  - Multiple data source integration
  - Fast scanning
  - API key configuration support

  **Use Cases:**
  - Subdomain enumeration
  - Asset discovery
  - Bug bounty reconnaissance
  - Penetration testing reconnaissance
parameters:
  - name: "domain"
    type: "string"
    description: "Target domain"
    required: true
    flag: "-d"
    format: "flag"
  - name: "silent"
    type: "bool"
    description: "Silent mode"
    required: false
    default: true
    flag: "-silent"
    format: "flag"
  - name: "all_sources"
    type: "bool"
    description: "Use all data sources"
    required: false
    default: false
    flag: "-all"
    format: "flag"
  - name: "additional_args"
    type: "string"
    description: "Additional Subfinder parameters"
    required: false
    format: "positional"
