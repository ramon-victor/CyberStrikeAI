name: "sqlmap"
command: "sqlmap"
enabled: true
# Short description (for tool listing, to reduce token consumption)
short_description: "Automated SQL injection detection and exploitation tool"
# Detailed tool description
description: |
  Automated SQL injection detection and exploitation tool, used for discovering and exploiting SQL injection vulnerabilities.

  **Key Features:**
  - Automatic detection of SQL injection vulnerabilities
  - Support for multiple database types (MySQL, PostgreSQL, Oracle, MSSQL etc.)
  - Automatic extraction of database information (tables, columns, data)
  - Support for multiple injection techniques (boolean-based blind, time-based blind, union query etc.)
  - Support for advanced features such as file upload/download, command execution etc.

  **Use Cases:**
  - Web application security testing
  - SQL injection vulnerability detection
  - Database information gathering
  - Penetration testing and vulnerability verification

  **Notes:**
  - Only use for authorized security testing
  - Some operations may impact the target system
  - Recommended to verify in a test environment first
  - Use --batch parameter to avoid interactive prompts
# Parameter definitions
parameters:
  - name: "url"
    type: "string"
    description: |
      Target URL, containing parameters that may have SQL injection.

      **Format requirements:**
      - Complete URL including protocol (http:// or https://)
      - Must include query parameters, mark injection point with * in parameter value
      - Or provide the complete URL directly, sqlmap will automatically detect parameters

      **Example Values:**
      - Mark injection point: "http://example.com/page?id=1*"
      - Complete URL: "http://example.com/page?id=1"
      - POST data: "http://example.com/login" (requires data parameter)
      - Cookie injection: "http://example.com/page" (requires cookie parameter)

      **Notes:**
      - URL must be accessible
      - Ensure URL format is correct, including protocol prefix
      - If using POST request, data parameter is required
      - Required parameter, cannot be empty
    required: true
    flag: "-u"
    format: "flag"
  - name: "batch"
    type: "bool"
    description: |
      Non-interactive mode, automatically selects default options, no user input required.

      **Use Cases:**
      - Automated testing scripts
      - Batch scanning
      - Avoiding interactive prompts

      **Notes:**
      - Recommended to always set to true, to avoid the tool waiting for user input
      - Default value is true
    required: false
    default: true
    flag: "--batch"
    format: "flag"
  - name: "level"
    type: "int"
    description: |
      Test level, range 1-5, higher levels are more comprehensive but take longer.

      **Level descriptions:**
      - Level 1: Basic testing, fast but may miss vulnerabilities
      - Level 2: Default level, balanced speed and coverage
      - Level 3: Extended testing, more comprehensive detection
      - Level 4: Deep testing, includes more payloads
      - Level 5: Most comprehensive testing, includes all known techniques

      **Recommendations:**
      - Fast scanning use 1-2
      - Regular testing use 3 (default)
      - Deep testing use 4-5

      **Notes:**
      - Higher levels generate more requests and may be blocked by WAF
      - Default value is 3
    required: false
    default: 3
    flag: "--level"
    format: "combined" # --level=3
  - name: "data"
    type: "string"
    description: |
      POST data string, used for SQL injection detection in POST requests.

      **Format:**
      - Form data format, for example: "username=admin&password=123"
      - JSON format, for example: '{"username":"admin","password":"123"}'

      **Notes:**
      - If the URL uses POST method, this parameter must be provided
      - Mark injection points with * in parameter values
    required: false
    flag: "--data"
    format: "flag"
  - name: "cookie"
    type: "string"
    description: |
      Cookie string, used for Cookie injection detection.

      **Format:**
      - Standard Cookie format, for example: "sessionid=abc123; user=admin"

      **Notes:**
      - If Cookie injection exists, this parameter must be provided
    required: false
    flag: "--cookie"
    format: "flag"
  - name: "additional_args"
    type: "string"
    description: |
      Additional SQLMap parameters. Used to pass SQLMap options not defined in the parameter list.

      **Example Values:**
      - "--dbs": List all databases
      - "--tables -D database": List tables in the specified database
      - "--dump -D database -T table": Dump table data
      - "--os-shell": Get operating system shell
      - "--risk 2": Risk level (1-3)
      - "--threads 10": Number of concurrent threads
      - "--tamper space2comment": Use tamper script to bypass WAF

      **Notes:**
      - Separate multiple parameters with spaces
      - Ensure correct parameter format to avoid command injection
      - This parameter is appended directly to the end of the command
    required: false
    format: "positional"
