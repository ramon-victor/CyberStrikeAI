name: "libc-database"
command: "python3"
args:
  - "-c"
  - |
    import shlex
    import subprocess
    import sys

    if len(sys.argv) < 2:
        sys.stderr.write("Missing action type (find/dump/download) \n")
        sys.exit(1)

    action = sys.argv[1]
    symbols = sys.argv[2] if len(sys.argv) > 2 else ""
    libc_id = sys.argv[3] if len(sys.argv) > 3 else ""
    extra = sys.argv[4] if len(sys.argv) > 4 else ""

    cmd = ["libc-database", action]

    if symbols:
        cmd.extend(shlex.split(symbols))

    if libc_id:
        cmd.append(libc_id)

    if extra:
        cmd.extend(shlex.split(extra))

    proc = subprocess.run(cmd, capture_output=True, text=True)
    if proc.stdout:
        sys.stdout.write(proc.stdout)
    if proc.stderr:
        sys.stderr.write(proc.stderr)
    sys.exit(proc.returncode)
enabled: true
short_description: "libc version database and offset lookup tool"
description: |
  Libc-database is a tool for libc identification and offset lookup.

  **Key Features:**
  - libc identification
  - Symbol offset lookup
  - libc download
  - Database query

  **Use Cases:**
  - CTF challenges
  - Exploit development
  - libc identification
  - Security research
parameters:
  - name: "action"
    type: "string"
    description: "Action to perform (find, dump, download)"
    required: true
    position: 0
    format: "positional"
  - name: "symbols"
    type: "string"
    description: "Symbols and offsets (format: symbol1:offset1 symbol2:offset2) "
    required: false
    default: ""
    position: 1
    format: "positional"
  - name: "libc_id"
    type: "string"
    description: "Libc ID (used for dump/download operations) "
    required: false
    default: ""
    position: 2
    format: "positional"
  - name: "additional_args"
    type: "string"
    description: |
      Additional libc-database parameters. Used to pass libc-database options not defined in the parameter list.

      **Example Values:**
      - Add common parameter examples based on the tool

      **Notes:**
      - Separate multiple parameters with spaces
      - Ensure correct parameter format to avoid command injection
      - This parameter is appended directly to the end of the command
    required: false
    default: ""
    position: 3
    format: "positional"
