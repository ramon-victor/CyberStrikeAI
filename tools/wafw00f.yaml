name: "wafw00f"
command: "wafw00f"
enabled: true
short_description: "Web application firewall detection tool"
description: |
  Wafw00f is a Web Application Firewall (WAF) detection and fingerprinting tool.

  **Key Features：**
  - WAF detection
  - WAF fingerprinting
  - Multi-WAF support
  - Bypass technique detection

  **Use Cases：**
  - WAF identification
  - Security testing
  - Penetration testing
  - Security assessment
parameters:
  - name: "target"
    type: "string"
    description: "Target URL or IP"
    required: true
    position: 0
    format: "positional"
  - name: "additional_args"
    type: "string"
    description: |
      Additional wafw00f arguments. Used to pass wafw00f options not defined in the parameter list.

      **Example Values：**
      - Add common parameter examples based on the tool

      **Notes：**
      - Separate multiple parameters with spaces
      - Ensure correct parameter format to avoid command injection
      - This parameter is appended directly to the end of the command
    required: false
    format: "positional"
