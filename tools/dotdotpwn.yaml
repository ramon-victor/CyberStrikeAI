name: "dotdotpwn"
command: "dotdotpwn"
enabled: true
short_description: "Directory traversal vulnerability testing tool"
description: |
  DotDotPwnis a directory traversal vulnerability testing tool, supporting multiple protocols.

  **Key Features:**
  - Directory traversal testing
  - Multiple protocol support (HTTP, FTP, TFTP, etc.)
  - Automated testing
  - Report generation

  **Use Cases:**
  - Directory traversal vulnerability testing
  - Web application security testing
  - Penetration testing
  - Vulnerability verification
parameters:
  - name: "target"
    type: "string"
    description: "Target hostname or IP"
    required: true
    flag: "-h"
    format: "flag"
  - name: "module"
    type: "string"
    description: "Module to use (http, ftp, tftp, etc.)"
    required: false
    flag: "-m"
    format: "flag"
    default: "http"
  - name: "additional_args"
    type: "string"
    description: |
      Additional dotdotpwn parameters. Used to pass dotdotpwn options not defined in the parameter list.

      **Example Values:**
      - Add common parameter examples based on the tool

      **Notes:**
      - Separate multiple parameters with spaces
      - Ensure correct parameter format to avoid command injection
      - This parameter is appended directly to the end of the command
    required: false
    format: "positional"
