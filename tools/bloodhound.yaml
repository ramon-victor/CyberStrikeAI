name: "bloodhound"
command: "bloodhound"
enabled: true
short_description: "Active Directory attack path analysis and visualization tool"
description: |
  BloodHound is an Active Directory attack path analysis and visualization tool that collects domain information and analyzes attack paths.

  **Key Features:**
  - Domain information collection
  - Attack path analysis
  - Permission relationship visualization
  - Shortest attack path computation
  - High-risk path identification

  **Use Cases:**
  - Active Directory security assessment
  - Post-exploitation testing
  - Domain environment audit
  - Red team exercises

  **Notes:**
  - Requires domain user credentials
  - Requires Neo4j database support
  - The collection process may take a long time
  - Recommended for use in authorized environments
parameters:
  - name: "domain"
    type: "string"
    description: "Target domain"
    required: false
    flag: "-d"
    format: "flag"
  - name: "username"
    type: "string"
    description: "Username"
    required: false
    flag: "-u"
    format: "flag"
  - name: "password"
    type: "string"
    description: "Password"
    required: false
    flag: "-p"
    format: "flag"
  - name: "collection_method"
    type: "string"
    description: "Collection method"
    required: false
    flag: "-c"
    format: "flag"
  - name: "additional_args"
    type: "string"
    description: |
      Additional BloodHound parameters for passing options not listed above.

      **Notes:**
      - Separate multiple parameters with spaces
    required: false
    format: "positional"
