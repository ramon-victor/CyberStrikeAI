name: "gau"
command: "gau"
enabled: true
short_description: "GetAllUrls - URL collection tool"
description: |
  Gau (Get All URLs) fetches all URLs for a target domain from multiple data sources.

  **Key Features:**
  - Fetch URLs from Wayback Machine
  - Fetch URLs from CommonCrawl
  - Fetch URLs from OTX
  - Fetch URLs from URLScan

  **Use Cases:**
  - URL discovery
  - Historical URL collection
  - Bug bounty reconnaissance
  - Security testing
parameters:
  - name: "domain"
    type: "string"
    description: "Target domain"
    required: true
    position: 0
    format: "positional"
  - name: "providers"
    type: "string"
    description: "Data providers (wayback,commoncrawl,otx,urlscan) "
    required: false
    flag: "--providers"
    format: "flag"
  - name: "include_subs"
    type: "bool"
    description: "Include subdomains"
    required: false
    flag: "--subs"
    format: "flag"
    default: true
  - name: "additional_args"
    type: "string"
    description: |
      Additional Gau parameters. Used to pass Gau options not defined in the parameter list.

      **Example Values:**
      - "--o output.txt": Output to file
      - "--threads 10": Number of threads
      - "--blacklist png,jpg,gif": Blacklist extensions

      **Notes:**
      - Separate multiple parameters with spaces
      - Ensure correct parameter format to avoid command injection
      - This parameter is appended directly to the end of the command
    required: false
    format: "positional"
