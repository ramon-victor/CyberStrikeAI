name: "fofa_search"
command: "python3"
args:
  - "-c"
  - |
    import sys
    import json
    import base64
    import requests
    import os

    # ==================== FOFA Configuration ====================
    # Please configure your FOFA account information here
    # You can also set it via environment variables: FOFA_EMAIL and FOFA_API_KEY
    # enabled default is false, must be enabled to run this MCP
    FOFA_EMAIL = "" # Please enter your FOFA account email
    FOFA_API_KEY = "" # Please enter your FOFA API key
    # ==================================================

    # FOFA API base URL
    base_url = "https://fofa.info/api/v1/search/all"

    # Parse arguments (from JSON string or command line arguments)
    def parse_args():
      # Try to read JSON configuration from the first argument
      if len(sys.argv) > 1:
        try:
          # Ensure sys.argv[1] is a string
          arg1 = str(sys.argv[1])
          # Try to parse as JSON
          config = json.loads(arg1)
          # Ensure the return type is a dictionary
          if isinstance(config, dict):
            return config
        except (json.JSONDecodeError, TypeError, ValueError):
          # If not JSON, use traditional positional argument mode
          pass

      # Traditional positional argument mode (backward compatible)
      # Note: email and api_key have been removed from parameters, now read from configuration
      # Parameter positions: query=2, size=3, page=4, fields=5, full=6
      # But in sys.argv, due to the python3 -c "code" format, actual positions need adjustment
      # sys.argv[0] is '-c', sys.argv[1] starts with actual arguments
      config = {}
      if len(sys.argv) > 1:
        config['query'] = str(sys.argv[1])
      if len(sys.argv) > 2:
        try:
          config['size'] = int(sys.argv[2])
        except (ValueError, TypeError):
          pass
      if len(sys.argv) > 3:
        try:
          config['page'] = int(sys.argv[3])
        except (ValueError, TypeError):
          pass
      if len(sys.argv) > 4:
        config['fields'] = str(sys.argv[4])
      if len(sys.argv) > 5:
        val = sys.argv[5]
        if isinstance(val, str):
          config['full'] = val.lower() in ('true', '1', 'yes')
        else:
          config['full'] = bool(val)
      return config

    try:
      config = parse_args()

      # Ensure config is a dictionary type
      if not isinstance(config, dict):
        error_result = {
          "status": "error",
          "message": f"Argument parsing error: expected dictionary type, but got {type(config).__name__}",
          "type": "TypeError"
        }
        print(json.dumps(error_result, ensure_ascii=False, indent=2))
        sys.exit(1)

      # Get email and api_key from configuration or environment variables
      email = os.getenv('FOFA_EMAIL', FOFA_EMAIL).strip()
      api_key = os.getenv('FOFA_API_KEY', FOFA_API_KEY).strip()
      query = config.get('query', '').strip()

      if not email:
        error_result = {
          "status": "error",
          "message": "Missing FOFA configuration: email (FOFA account email)",
          "required_config": ["email", "api_key"],
          "note": "Please enter your FOFA account email in the FOFA_EMAIL configuration item in the YAML file, or set it in the environment variable FOFA_EMAIL"
        }
        print(json.dumps(error_result, ensure_ascii=False, indent=2))
        sys.exit(1)

      if not api_key:
        error_result = {
          "status": "error",
          "message": "Missing FOFA configuration: api_key (FOFA API key)",
          "required_config": ["email", "api_key"],
          "note": "Please enter your API key in the FOFA_API_KEY configuration item in the YAML file, or set it in the environment variable FOFA_API_KEY. The API key can be obtained from the FOFA user center: https://fofa.info/userInfo"
        }
        print(json.dumps(error_result, ensure_ascii=False, indent=2))
        sys.exit(1)

      if not query:
        error_result = {
          "status": "error",
          "message": "Missing required parameter: query (search query statement)",
          "required_params": ["query"],
          "examples": [
            'app="Apache"',
            'title="Login"',
            'domain="example.com"',
            'ip="1.1.1.1"',
            'port="80"',
            'country="CN"',
            'city="Beijing"'
          ]
        }
        print(json.dumps(error_result, ensure_ascii=False, indent=2))
        sys.exit(1)

      # Build request parameters
      params = {
        'email': email,
        'key': api_key,
        'qbase64': base64.b64encode(query.encode('utf-8')).decode('utf-8')
      }

      # Optional parameters
      if 'size' in config and config['size'] is not None:
        try:
          size = int(config['size'])
          if size > 0:
            params['size'] = size
        except (ValueError, TypeError):
          pass

      if 'page' in config and config['page'] is not None:
        try:
          page = int(config['page'])
          if page > 0:
            params['page'] = page
        except (ValueError, TypeError):
          pass

      if 'fields' in config and config['fields']:
        params['fields'] = str(config['fields']).strip()

      if 'full' in config and config['full'] is not None:
        full_val = config['full']
        if isinstance(full_val, bool):
          params['full'] = 'true' if full_val else 'false'
        elif isinstance(full_val, str):
          params['full'] = 'true' if full_val.lower() in ('true', '1', 'yes') else 'false'
        elif isinstance(full_val, (int, float)):
          params['full'] = 'true' if full_val != 0 else 'false'

      # Send request
      try:
        response = requests.get(base_url, params=params, timeout=30)
        response.raise_for_status()

        result_data = response.json()

        # Check FOFA API returned errors
        if result_data.get('error'):
          error_result = {
            "status": "error",
            "message": f"FOFA API error: {result_data.get('errmsg', 'Unknown error')}",
            "error_code": result_data.get('error'),
            "suggestion": "Please check if the API key is correct, or if the query statement conforms to FOFA syntax"
          }
          print(json.dumps(error_result, ensure_ascii=False, indent=2))
          sys.exit(1)

        # Format output results
        output = {
          "status": "success",
          "query": query,
          "size": result_data.get('size', 0),
          "page": result_data.get('page', 1),
          "total": result_data.get('total', 0),
          "results_count": len(result_data.get('results', [])),
          "results": result_data.get('results', []),
          "message": f"Successfully retrieved {len(result_data.get('results', []))} results"
        }

        print(json.dumps(output, ensure_ascii=False, indent=2))

      except requests.exceptions.RequestException as e:
        error_result = {
          "status": "error",
          "message": f"Request failed: {str(e)}",
          "suggestion": "Please check network connection or FOFA API service status"
        }
        print(json.dumps(error_result, ensure_ascii=False, indent=2))
        sys.exit(1)

    except Exception as e:
      error_result = {
        "status": "error",
        "message": f"Execution error: {str(e)}",
        "type": type(e).__name__
      }
      print(json.dumps(error_result, ensure_ascii=False, indent=2))
      sys.exit(1)
enabled: false
short_description: "FOFA network asset search engine client"
description: |
  FOFA is a cyberspace mapping search engine that can search internet assets via various query conditions.

  **Key Features:**
  - Supports multiple query syntaxes (app, title, domain, ip, port, country, city, etc.)
  - Flexible field return configuration
  - Paginated query support
  - Full data mode (full parameter)

  **Use Cases:**
  - Asset discovery and enumeration
  - Vulnerability impact assessment
  - Security posture awareness
  - Threat intelligence collection
  - Bug bounty information gathering

  **Query Syntax Guide:**

  **Basic Queries:**
  - Enter a query statement directly, which will search from title, HTML content, HTTP header information, and URL fields
  - If the query expression has multiple AND/OR relationships, try to enclose them in parentheses, for example: `(app="Apache" || app="Nginx") && country="CN"`

  **Logical Connectors:**
  - `=` - Match, when ="" it can query fields that do not exist or have empty values
  - `==` - Exact match, when =="" it can query fields that exist and have empty values
  - `&&` - AND
  - `||` - OR
  - `!=` - Not match, when !="" it can query fields with non-empty values
  - `*=` - Fuzzy match, use * or ? for searching
  - `()` - Confirm query priority, content in parentheses has the highest priority

  **Common Query Syntax Categories:**

  **Basic:** `ip` (supports IPv4/IPv6/CIDR), `port`, `domain`, `host`, `os`, `server`, `asn`, `org`, `is_domain`, `is_ipv6`

  **Tags:** `app` (application identification), `fid` (site fingerprint), `product`, `product.version`, `category`, `type` (service/subdomain), `cloud_name`, `is_cloud`, `is_fraud`, `is_honeypot`

  **Protocols (type=service):** `protocol`, `banner`, `banner_hash`, `banner_fid`, `base_protocol` (tcp/udp)

  **Websites (type=subdomain):** `title`, `header`, `header_hash`, `body`, `body_hash`, `js_name`, `js_md5`, `cname`, `cname_domain`, `icon_hash`, `status_code`, `icp`, `sdk_hash`

  **Geolocation:** `country` (supports code/name), `region` (supports English/name), `city`

  **Certificates:** `cert`, `cert.subject`, `cert.issuer`, `cert.subject.org`, `cert.subject.cn`, `cert.issuer.org`, `cert.issuer.cn`, `cert.domain`, `cert.is_equal`, `cert.is_valid`, `cert.is_match`, `cert.is_expired`, `jarm`, `tls.version`, `tls.ja3s`, `cert.sn`, `cert.not_after.after/before`, `cert.not_before.after/before`

  **Time:** `after` (updated after a certain time), `before` (updated before a certain time)

  **Standalone IP Syntax (cannot be combined with other syntaxes):** `port_size`, `port_size_gt`, `port_size_lt`, `ip_ports`, `ip_country`, `ip_region`, `ip_city`, `ip_after`, `ip_before`

  **Common Query Examples:**
  - `app="Apache"` - Search for Apache applications
  - `title="Login"` - Search for pages with "Login" in the title
  - `domain="example.com"` - Search for a specific domain name
  - `ip="1.1.1.1"` or `ip="220.181.111.1/24"` - Search for IP or CIDR range
  - `port="80"` - Search for assets with port 80 open
  - `country="CN"` or `country="China"` - Search for assets within China
  - `city="Beijing"` - Search for assets in Beijing
  - `app="Apache" && country="CN"` - Combined query
  - `(app="Apache" || app="Nginx") && country="CN"` - Complex query using parentheses
  - `title*="Login"` - Fuzzy match title
  - `after="2023-01-01" && before="2023-12-01"` - Time range query

  **Detailed Syntax Documentation:** For more syntax descriptions and component lists, please refer to the official FOFA documentation

  **Notes:**
  - API calls have rate limits, please use reasonably
  - Query result count is limited by account permissions
  - The full parameter requires advanced permissions
parameters:

  - name: "query"
    type: "string"
    description: |
      FOFA query statement (required)

      Search query statement, supporting FOFA query syntax.
      Examples:
      - app="Apache"
      - title="Login"
      - domain="example.com"
      - ip="1.1.1.1"
      - port="80"
      - country="CN"
      - app="Apache" && country="CN"
    required: true
    position: 2
    format: "positional"
  - name: "size"
    type: "int"
    description: |
      Number of results to return (optional)

      Number of results per page, default 100.
      Range: 1-10000, subject to account permissions.
    required: false
    position: 3
    format: "positional"
    default: 100
  - name: "page"
    type: "int"
    description: |
      Page number (optional)

      The page number to return, starting from 1, default 1.
      Used for paginated queries of large result sets.
    required: false
    position: 4
    format: "positional"
    default: 1
  - name: "fields"
    type: "string"
    description: |
      List of fields to return (optional)

      Fields to return, multiple fields separated by commas.
      Default fields: ip,port,domain
      Available fields: host,title,ip,domain,port,protocol,country,province,city,server,icp,header,banner,body,as_number,as_organization
    required: false
    position: 5
    format: "positional"
    default: "ip,port,domain"
  - name: "full"
    type: "bool"
    description: |
      Whether to return full data (optional)

      When set to true, returns full data, which requires advanced permissions.
      Default is false, returning basic data.
    required: false
    position: 6
    format: "positional"
    default: false
