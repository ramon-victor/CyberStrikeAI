name: "exec"
command: "sh"
args: ["-c"]
enabled: true
# Short description (used for tool lists, reduces token consumption)
short_description: "System command execution tool for running shell commands (use with caution)"
# Detailed tool description
description: |
  System command execution tool, used for running Shell commands and system operations.

  **Key Features：**
  - Execute arbitrary shell commands
  - Supports bash, sh, and other shells
  - Can specify working directory
  - Returns command execution results

  **Use Cases：**
  - System administration and maintenance
  - Automated script execution
  - File operations and processing
  - System information gathering

  **Security Warning：**
  - ⚠️ This tool can execute arbitrary system commands, which poses security risks
  - ⚠️ Should only be used in controlled environments
  - ⚠️ All command executions are logged
  - ⚠️ It is recommended to limit the range of executable commands
  - ⚠️ Do not execute untrusted commands
# Parameter definitions
parameters:
  - name: "command"
    type: "string"
    description: |
      The system command to execute. Can be any valid Shell command.

      **Format requirements：**
      - Complete Shell command
      - Can include pipes, redirection, and other Shell features
      - Supports environment variables

      **Example Values：**
      - Simple command: "ls -la"
      - With pipe: "ps aux | grep nginx"
      - File operation: "cat /etc/passwd"
      - Network command: "curl http://example.com"
      - System info: "uname -a"
      - Find files: "find /var/log -name '*.log'"

      **Notes：**
      - The command will be executed in the specified shell
      - Ensure correct command syntax
      - Be aware of the security implications of the command
      - Required parameter, cannot be empty
    required: true
    position: 0
    format: "positional"
  - name: "shell"
    type: "string"
    description: |
      The Shell type to use, defaults to sh.

      **Optional values：**
      - sh: Standard Shell (default)
      - bash: Bash Shell
      - zsh: Z Shell
      - Other shells available on the system

      **Example Values：**
      - "sh" (default)
      - "bash"
      - "zsh"

      **Notes：**
      - Ensure the specified shell is available on the system
      - Command syntax may vary slightly between different shells
    required: false
    default: "sh"
  - name: "workdir"
    type: "string"
    description: |
      The working directory for command execution. If not specified, the current working directory is used.

      **Format requirements：**
      - Absolute or relative path
      - Directory must exist

      **Example Values：**
      - "/tmp"
      - "/var/log"
      - "./data"
      - "/home/user/project"

      **Notes：**
      - Ensure the directory exists and is accessible
      - Relative paths are relative to the program's running directory
    required: false
  - name: "additional_args"
    type: "string"
    description: |
      Additional exec parameters. Used to pass exec options not defined in the parameter list.

      **Example Values：**
      - Add common parameter examples based on the tool

      **Notes：**
      - Separate multiple parameters with spaces
      - Ensure correct parameter format to avoid command injection
      - This parameter is appended directly to the end of the command
    required: false
    format: "positional"
