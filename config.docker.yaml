# ============================================
# CyberStrikeAI configuration file
# ============================================
# This configuration file supports visual configuration through the web UI
# Click the Settings button in the upper-right corner to change settings
# ============================================

# ============================================
# System settings
# ============================================

# Version shown in the frontend (optional; uses the default version when empty)
version: "v1.6.27"
# Server settings
server:
  host: 0.0.0.0 # Listen address; 0.0.0.0 listens on all network interfaces
  port: 7022 # Service port; without TLS, use http://localhost:7022
  # --- Optional: HTTPS + HTTP/2 (reduces browser same-origin HTTP/1.1 connection limits and makes multiple Deep streams more stable) ---
  # TLS is enabled when any condition is met: tls_enabled: true, tls_auto_self_sign: true, or both tls_cert_path and tls_key_path are configured.
  # After enabling, visit https://127.0.0.1:7022/. HTTP requests to the same port are redirected to HTTPS with 308 unless tls_http_redirect is false.
  tls_enabled: true
  # When HTTPS is enabled, redirect plaintext HTTP to HTTPS automatically (default true; the same port sniffs and routes TLS/HTTP)
  # tls_http_redirect: true
  # Option A (recommended for production): PEM certificate and private key paths
  # tls_cert_path: /path/to/fullchain.pem
  # tls_key_path: /path/to/privkey.pem
  # Option B (local/test only): in-memory self-signed certificate when no certificate file is provided (browsers warn as untrusted; SAN includes localhost / 127.0.0.1)
  tls_auto_self_sign: true
# Authentication settings
auth:
  password:  # Web login password; change this to a strong password
  session_duration_hours: 12 # Login validity period in hours; users must sign in again after timeout
# Logging settings
log:
  level: info # Log level: debug, info, warn, error
  output: stdout # Log output: stdout, stderr, or a file path
# ============================================
# Conversation settings
# ============================================

# AI model settings (supports OpenAI-compatible APIs)
# Required: api_key, base_url, and model must be set for normal operation
# Supported API providers:
#   - OpenAI: https://api.openai.com/v1
#   - DeepSeek: https://api.deepseek.com/v1
#   - Other OpenAI-compatible APIs
# Common models: gpt-4, gpt-3.5-turbo, deepseek-chat, claude-3-opus, etc.
# provider: allowed values are openai (default) or claude (automatically bridged to the Anthropic Claude Messages API)
openai:
  provider: openai # API provider: openai (default, OpenAI-compatible) or claude (automatically bridged to the Anthropic Claude Messages API)
  base_url: https://dashscope.aliyuncs.com/compatible-mode/v1 # API base URL (required)
  api_key: sk-xxxxxxx # API key (required)
  model: qwen3-max # Model name (required)
  max_total_tokens: 120000 # Maximum token limit for LLM context; shared by memory compression and attack-chain construction
  # Eino-path model reasoning: DeepSeek/OpenAI use fields such as thinking / reasoning_effort; provider claude maps to Anthropic top-level thinking (extended thinking); mode: off disables it
  reasoning:
    mode: off # auto | on | off; off adds no reasoning extension fields
    effort: max # low | medium | high | max;empty means unspecified(with openai_compat, auto without an effort does not send request extensions)
    allow_client_reasoning: true # false ignores reasoning in the conversation request body and uses only the settings below
    profile: openai_compat # auto | deepseek_compat | openai_compat | output_config_effort
    # extra_request_fields: {} # Optional: administrator-defined root-level JSON fragment (advanced)
# ============================================
# Information gathering (FOFA) settings (optional)
# ============================================
# Used by the Information Gathering page to call the FOFA API through the backend proxy, avoiding frontend key exposure
# Can also be configured through environment variables FOFA_EMAIL / FOFA_API_KEY, which take precedence
fofa:
  base_url: https://fofa.info/api/v1/search/all # Optional; leave empty to use the default
  email: "" # FOFA account email (optional; recommended to set in System Settings)
  api_key: "" # FOFA API key (optional; recommended to set in System Settings)
# Agent settings
# When the maximum iteration count is reached, the AI automatically summarizes test results
agent:
  max_iterations: 120 # Maximum iteration count; the maximum number of tool-call rounds the AI agent can run
  large_result_threshold: 102400 # Large-result threshold in bytes; default 50 KB; larger results are automatically saved to storage
  result_storage_dir: tmp # Result storage directory; large results are saved here
  tool_timeout_minutes: 30 # Maximum duration in minutes for one tool execution; timed-out tools are terminated automatically; 0 means unlimited (not recommended because long hangs are likely)
  # system_prompt_path: prompts/single-react.md # Optional: single-agent system prompt file, relative to this configuration file directory; when non-empty and readable, it replaces the built-in prompt
# Human-in-the-loop (HITL) global whitelist: tools listed here always bypass approval and are unioned with the conversation page whitelist; the sidebar Apply action can merge entries into this list immediately.
hitl:
  # Add or remove actual tool names from your environment (same as the sidebar, case-insensitive); use [] if no global approval bypass is needed
  tool_whitelist: [read_file, list_dir, glob, grep]
# Multi-agent (CloudWeGo Eino DeepAgent, coexists with the single-agent /api/agent-loop above)
# Dependencies are pulled through go.mod; if downloads fail, set: go env -w GOPROXY=https://goproxy.cn,direct
# After enabling, restart the service to register /api/multi-agent and /api/multi-agent/stream; Deep / Plan-Execute / Supervisor are passed in the request body from the mode selected on the conversation page and WebShell; robots and batches without a request body use deep
multi_agent:
  enabled: true
  robot_use_multi_agent: true # true: WeCom/DingTalk/Lark robots also use Eino multi-agent (higher cost)
  batch_use_multi_agent: false # true: each subtask in the batch task queue also uses Eino multi-agent (higher cost)
  max_iteration: 0 # Maximum rounds for the main agent / plan_execute executor; 0 means use agent.max_iterations
  # For plan_execute only: maximum outer execute-replan loop count; 0 means Eino default 10. The current Executor mounts pre-middlewares such as patch/reduction/tool_search.
  plan_execute_loop_max_iterations: 0
  sub_agent_max_iterations: 120
  sub_agent_user_context_max_runes: 0 # Character limit for automatically injecting the original user request into sub-agent task descriptions; 0 = default 2000, negative = disabled
  without_general_sub_agent: false # false keeps Deep built-in general-purpose sub-agents
  without_write_todos: false
  orchestrator_instruction: "" # Deep main agent: agents/orchestrator.md, or the single .md with kind: orchestrator, takes precedence; use this when the body is empty; if both are empty, use Eino default
  orchestrator_instruction_plan_execute: "" # plan_execute main agent: agents/orchestrator-plan-execute.md body takes precedence; use this when the body is empty; if both are empty, use the built-in plan_execute prompt (does not use Deep orchestrator_instruction)
  orchestrator_instruction_supervisor: "" # supervisor main agent: agents/orchestrator-supervisor.md body takes precedence; use this when the body is empty; if both are empty, use the built-in supervisor prompt (transfer/exit instructions are still appended at runtime; does not use Deep orchestrator_instruction)
  # Eino official Skills: progressive disclosure plus optional local file/Shell support (eino-ext local backend). See skills_dir for the Skills directory.
  eino_skills:
    disable: false # true: does not register the skill progressive-disclosure middleware or mount local FS/Shell tools; false: loads according to the switches below
    filesystem_tools: true # true: registers read_file/glob/grep/write/edit/execute (use carefully in authorized environments); false: skill only; does not expose local read/write or Shell
    skill_tool_name: skill # Tool name the model can call to load skills; usually keep skill; it only needs to match the call name in skill package docs
  # Eino ADK middleware and Deep/Supervisor tuning (see internal/config/config.go -> MultiAgentEinoMiddlewareConfig)
  eino_middleware:
    patch_tool_calls: true # true: patches dangling tool_call entries in history that have no tool_result (more stable after stream interrupts/retries); false: disabled; omitted field defaults to true
    tool_search_enable: false # true: enables tool_search when tool count >= min; only the first N tools are always visible and the rest are unlocked on demand by regex, saving tokens and reducing wrong tool choices; false: all tools go into context
    tool_search_min_tools: 20 # Enable tool_search only at this count (avoids overhead when there are few tools); used with always_visible
    tool_search_always_visible: 12 # Number of tools always exposed directly to the model (order matches the role tool list); the remaining tools enter a dynamic pool and require tool_search to unlock
    tool_search_always_visible_tools: [read_file, glob, grep, write_file, edit_file, execute, task, transfer_to_agent, exit, write_todos, skill, tool_search, TaskCreate, TaskGet, TaskUpdate, TaskList, record_vulnerability, list_knowledge_risk_types, search_knowledge_base, webshell_exec, webshell_file_list, webshell_file_read, webshell_file_write, manage_webshell_list, manage_webshell_add, manage_webshell_update, manage_webshell_delete, manage_webshell_test, batch_task_list, batch_task_get, batch_task_start, batch_task_rerun, batch_task_pause, batch_task_update_metadata, batch_task_update_schedule, batch_task_schedule_enabled, batch_task_update_task, batch_task_remove_task, batch_task_delete, batch_task_create, batch_task_add_task, http-framework-test] # Backend built-in always-visible tool whitelist (takes precedence over the always_visible count policy)
    plantask_enable: false # true: main agent (Deep / Supervisor main) mounts TaskCreate/Get/Update/List; requires eino_skills to be usable and skills_dir to exist, otherwise it only logs and skips
    plantask_rel_dir: .eino/plantask # Subdirectory under skills_dir for structured task files; files are further stored by session ID subdirectory
    reduction_enable: true # true: truncates and persists large tool output to control context; depends on the same Eino local write backend as plantask and is not mounted without a backend
    reduction_max_length_for_trunc: 50000 # Truncate and persist a single tool result when it exceeds this character count in bytes (handled by reduction middleware)
    reduction_max_tokens_for_clear: 160000 # History tool-result cleanup threshold in tokens; old results are cleared before model calls when over the threshold
    reduction_root_dir: "" # Non-empty: root path for persisted truncated/cleared content; empty: use the default per-session isolated path under the system temp directory
    reduction_clear_exclude: [] # Additional tool names excluded from the cleanup phase (merged with built-in exclusions such as task/transfer/exit); use a YAML list when needed
    reduction_sub_agents: true # true: sub-agents also mount reduction; false: only the orchestrator main agent uses reduction
    summarization_trigger_ratio: 0.8 # Summarization trigger ratio (max_total_tokens * ratio); recommended 0.75-0.85
    summarization_emit_internal_events: true # true: emits summarization internal events for diagnostics
    history_input_budget_ratio: 0.35 # History input budget ratio (max_total_tokens * ratio)
    plan_execute_user_input_budget_ratio: 0.35 # userInput budget ratio in plan_execute (shared by planner/replanner/executor)
    plan_execute_executed_steps_budget_ratio: 0.2 # executed_steps budget ratio in plan_execute
    plan_execute_max_step_result_runes: 4000 # Maximum characters per plan_execute step result (truncated when exceeded)
    plan_execute_keep_last_steps: 8 # plan_execute keeps only the body text of the latest N steps; earlier steps are folded to titles
    checkpoint_dir: "" # Non-empty: enable a file CheckPointStore with per-session subdirectories for adk.NewRunner to persist interrupt recovery; Resume HTTP/frontend flow requires separate integration
    deep_output_key: "" # Non-empty: key name used to write final assistant output into the ADK session (Deep and Supervisor main agents); empty means do not write
    deep_model_retry_max_retries: 0 # >0: Maximum framework-level retries when ChatModel calls fail (Deep and Supervisor main agents); 0: no retry
    task_tool_description_prefix: "" # Non-empty: only the Deep task tool uses this custom description prefix; the sub-agent name is appended at runtime; empty uses Eino default generation logic
  # Eino callbacks + OpenTelemetry: framework-level spans aligned with Zap; by default eino_trace_* is not pushed to end-user UI (see sse_trace_to_client)
  eino_callbacks:
    enabled: true
    # log_only=Zap+OTel only (recommended default) | sse/full enables stream callback copy closing and related behavior (full includes stream hooks)
    mode: log_only
    sse_trace_to_client: false # true: when mode is sse/full, push eino_trace_* to the frontend timeline (for troubleshooting/internal demos)
    max_input_summary_runes: 400
    max_output_summary_runes: 400
    zap_verbose: false # true:Debug includes input/output summaries
    otel:
      enabled: true
      service_name: cyberstrike-ai
      exporter: stdout # none | stdout (development/local)| otlphttp (production to Collector)
      otlp_endpoint: localhost:4318 # otlphttp used in this mode; host:port, with fixed path /v1/traces
      sample_ratio: 1.0 # 0-1, ParentBased+TraceIDRatio
# Database settings
database:
  path: data/conversations.db # SQLite database file path used to store conversation history and messages
  knowledge_db_path: data/knowledge.db # Knowledge-base database file path (optional; empty uses the conversation database), used to store knowledge-base items and vector embeddings and can be copied/reused independently
# ============================================
# Task management settings
# ============================================
# Configuration items are already included in the conversation settings

# ============================================
# Vulnerability management settings
# ============================================

# Security tool settings
# The system loads all .yaml tool configuration files from this directory
# Recommended: create a separate configuration file for each tool under tools/
security:
  tools_dir: tools # Tool configuration file directory, relative to this configuration file directory
  # Tool description mode: source of descriptions exposed to AI/API when loading tools under tools
  #   short - prefer short_description (brief description, saves tokens); use description when empty
  #   full  - use description (detailed description)
  tool_description_mode: full
# ============================================
# MCP settings
# ============================================

# MCP protocol settings
# MCP (Model Context Protocol) is used for tool registration and invocation
mcp:
  enabled: false # Whether to enable the MCP server (HTTP mode)
  host: 0.0.0.0 # MCP server listen address
  port: 8081 # MCP server port
  auth_header: "X-MCP-Token" # Authentication: requests must include this header and its value must match auth_header_value to be allowed. Empty disables authentication
  auth_header_value: "" # Authentication secret value (used with auth_header; a random string is recommended)
# External MCP settings
external_mcp:
  servers: {}
# Built-in C2: set false when this host is only used for conversations/knowledge base; no listener starts and no C2 MCP tools are registered; enabled by default when this section is omitted
c2:
  enabled: true
# ============================================
# Knowledge-base settings
# ============================================
knowledge:
  enabled: false # Whether to enable knowledge retrieval
  base_path: knowledge_base # Knowledge-base directory path, relative to this configuration file directory
  embedding:
    provider: openai # Embedding model provider (currently only openai is supported)
    model: text-embedding-v4 # Embedding model name
    base_url: https://dashscope.aliyuncs.com/compatible-mode/v1 # Leave empty to use base_url from the OpenAI configuration
    api_key: sk-xxxxxxx # Leave empty to use api_key from the OpenAI configuration
  retrieval:
    top_k: 5 # Number of Top-K results returned by retrieval
    similarity_threshold: 0.4 # Cosine similarity threshold (0-1); results below this value are filtered out
    # Post-retrieval processing: fixed body normalization and deduplication, context budget, and optional code-injected DocumentReranker reranking
    post_retrieve:
      prefetch_top_k: 0 # 0 means same as top_k; set to 15-30 to still fill top_k after deduplication
      max_context_chars: 0 # 0 means unlimited; otherwise the maximum total Unicode characters returned in body text (whole chunks)
      max_context_tokens: 0 # 0 means unlimited; otherwise the total tiktoken token limit
    sub_index_filter: ""
  # ============================================
  # Indexing settings (used to handle API limits)
  # ============================================
  indexing:
    # Chunking settings
    chunk_size: 512 # Maximum tokens per chunk (default 512); long text is split into multiple chunks
    chunk_overlap: 50 # Overlapping tokens between chunks (default 50), preserving context continuity
    max_chunks_per_item: 0 # Maximum chunks per knowledge item (0 means unlimited), preventing one file from consuming too much API quota
    # Rate-limit settings (handles 429 errors)
    max_rpm: 0 # Maximum requests per minute (default 0 means unlimited), e.g. OpenAI default 200 RPM
    rate_limit_delay_ms: 300 # Delay between requests in milliseconds (default 300) to avoid API rate limits; set 0 for no limit
    # Recommended values: 200 requests/minute ~= 300 ms, 100 requests/minute ~= 600 ms

    # Retry settings
    max_retries: 3 # Maximum retry count (default 3); automatically retry on rate limits or server errors
    retry_delay_ms: 1000 # Retry interval in milliseconds (default 1000); delay increases on each retry
    # Chunking strategy (Eino): markdown_then_recursive = split by Markdown headings first, then recursively; recursive = recursive splitting only. Empty uses the built-in default markdown_then_recursive
    chunk_strategy: markdown_then_recursive
    # Embedding HTTP request timeout in seconds. 0 uses the built-in default, usually 120, matching the vectorization API client
    request_timeout_seconds: 120
    # true: during indexing, prefer disk file content pointed to by the knowledge item file_path (Eino FileLoader); false: use body text stored in the database. Disk read failures fall back to the DB
    prefer_source_file: false
    # Maximum number of texts per embedding API request (index writes are batched by this). Must be <= provider limit (some compatible APIs allow at most 10); too large can cause 400
    batch_size: 10
    # Eino indexer.WithSubIndexes: logical partition tag list written to vector table sub_indexes; retrieval can filter with sub_index_filter; use [] when not needed
    sub_indexes: []
# ============================================
# Robot settings (WeCom, DingTalk, Lark)
# ============================================
# Use WeCom/DingTalk/Lark on mobile to chat with CyberStrikeAI; can be used without deploying on a server
# Configurable in System Settings -> Robot Settings
robots:
  wecom: # WeCom
    enabled: false
    token: ""
    encoding_aes_key: ""
    corp_id: ""
    secret: ""
    agent_id: 0
  dingtalk: # DingTalk
    enabled: false
    client_id: ""
    client_secret: ""
  lark: # Lark
    enabled: false
    app_id: ""
    app_secret: ""
    verify_token: ""
# ============================================
# Skills settings
# ============================================

# Skill package directory: each subdirectory contains only standard SKILL.md (Agent Skills front matter only name and description) plus optional supporting files; no SKILL.yaml
# Example: skills/cyberstrike-eino-demo/
skills_dir: skills # Skills configuration file directory, relative to this configuration file directory
# ============================================
# Multi-agent sub-agents (Markdown, the single source of maintenance)
# ============================================
# Each .md: YAML front matter (name / id / description / tools / bind_role / max_iterations / optional kind: orchestrator) plus body as the system prompt
# Main agent: fixed filename orchestrator.md, or any filename with front matter kind: orchestrator (only one allowed in the directory); main agent is not included in the task sub-agent list
# Advanced use: sub_agents can still be written in the multi_agent block; they are merged with this directory, and .md overrides YAML for the same id
agents_dir: agents
# ============================================
# Role settings
# ============================================

# The system loads all .yaml role configuration files from this directory
# Create a separate configuration file for each role, such as roles/CTF.yaml or roles/default.yaml
roles_dir: roles # Role configuration file directory, relative to this configuration file directory
